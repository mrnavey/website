<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Starlight Search</title>
<style>
  :root{
    --bg:#0b1026;
    --ink:#eaf0ff;
    --ink-dim:#9aa6cf;
    --select:#a78bfa;
    --found:#5ee6c9;
    --found-ink:#06281f;
    --span:#ffd166;
    --span-ink:#3a2a00;
    --hint:#7dd3fc;
    --flame:#ff9e64;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:radial-gradient(120% 90% at 50% 0%, #1a2350 0%, var(--bg) 55%, #060818 100%);
    color:var(--ink);
    font-family:"Avenir Next","Trebuchet MS","Segoe UI",system-ui,sans-serif;
    display:flex; flex-direction:column; align-items:center;
    min-height:100%; overflow:hidden;
    touch-action:manipulation;
    user-select:none; -webkit-user-select:none;
  }
  #stars{position:fixed; inset:0; z-index:0; pointer-events:none;}
  .star{position:absolute; border-radius:50%; background:#fff; opacity:.6; animation:twinkle 3.5s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.8}}
  @media (prefers-reduced-motion: reduce){ .star{animation:none; opacity:.4;} }

  header{z-index:2; text-align:center; padding:10px 16px 0;}
  h1{margin:0; font-size:clamp(20px,4.6vw,27px); letter-spacing:.16em; font-weight:700; text-transform:uppercase;}
  h1 .glow{color:var(--span); text-shadow:0 0 18px rgba(255,209,102,.45);}
  #meta{
    font:inherit; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-dim);
    margin-top:3px; background:none; border:none; cursor:pointer;
    border-bottom:1px dotted rgba(154,166,207,.6); padding:1px 2px;
  }
  #meta:focus-visible{outline:2px solid var(--ink); outline-offset:2px;}

  .theme-card{
    z-index:2; margin:8px auto 4px; padding:7px 18px; border-radius:14px;
    background:linear-gradient(180deg, rgba(167,139,250,.18), rgba(167,139,250,.06));
    border:1px solid rgba(167,139,250,.35); text-align:center; max-width:480px;
  }
  .theme-card .eyebrow{font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-dim); margin:0 0 2px;}
  .theme-card .theme{font-size:clamp(15px,4vw,19px); font-weight:700; margin:0;}

  #currentRow{z-index:2; display:flex; align-items:center; justify-content:center; gap:10px; height:40px;}
  #current{
    min-width:80px; text-align:center;
    font-size:clamp(17px,4.4vw,22px); font-weight:700; letter-spacing:.28em; color:var(--select);
  }
  #current.flash-good{color:var(--found);}
  #current.flash-bad{animation:shake .35s;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .mini{
    font:inherit; font-size:12px; font-weight:700; letter-spacing:.08em;
    padding:6px 13px; border-radius:999px; cursor:pointer;
    border:1px solid rgba(167,139,250,.5); background:rgba(167,139,250,.14); color:var(--select);
  }
  .mini:disabled{opacity:.3; cursor:default;}
  .mini:active{transform:scale(.95);}
  .mini:focus-visible, .btn:focus-visible{outline:2px solid var(--ink); outline-offset:2px;}

  #board-wrap{z-index:2; position:relative; padding:6px;}
  svg#lines{position:absolute; inset:6px; width:calc(100% - 12px); height:calc(100% - 12px); pointer-events:none; z-index:1;}
  #board{
    position:relative; z-index:2;
    display:grid; grid-template-columns:repeat(6, var(--cell)); grid-auto-rows:var(--cell);
    gap:var(--gap);
    touch-action:none;   /* swiping the board must not scroll the page */
  }
  .cell{
    width:var(--cell); height:var(--cell); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:calc(var(--cell) * .42); font-weight:700;
    color:var(--ink); cursor:pointer; position:relative;
    transition:background .12s, color .12s, transform .12s;
  }
  .cell.selected{background:var(--select); color:#1b1040; transform:scale(1.05);}
  .cell.last{box-shadow:0 0 0 3px rgba(234,240,255,.85);}
  .cell.found{background:var(--found); color:var(--found-ink);}
  .cell.spangram{background:var(--span); color:var(--span-ink);}
  .cell.hinted::after{
    content:""; position:absolute; inset:2px; border-radius:50%;
    border:2px dashed var(--hint); animation:pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:.5; transform:scale(1)}50%{opacity:1; transform:scale(1.06)}}
  @media (prefers-reduced-motion: reduce){ .cell.hinted::after{animation:none;} }
  .cell.pop{animation:pop .35s;}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.25)}100%{transform:scale(1)}}

  #hud{z-index:2; display:flex; gap:10px; align-items:center; margin:8px 0 6px; flex-wrap:wrap; justify-content:center;}
  #progress{font-size:13px; color:var(--ink-dim);}
  #progress b{color:var(--ink);}
  #streak{font-size:13px; color:var(--flame); font-weight:700;}
  button.btn{
    font:inherit; font-size:13px; font-weight:700; letter-spacing:.06em;
    padding:8px 15px; border-radius:999px; border:1px solid rgba(125,211,252,.5);
    background:rgba(125,211,252,.12); color:var(--hint); cursor:pointer;
  }
  button.btn:active{transform:scale(.96);}
  button.btn:disabled{opacity:.35; cursor:default;}
  #howto{z-index:2; font-size:11.5px; color:var(--ink-dim); margin:0 16px 10px; text-align:center;}

  #toast{
    z-index:30; position:fixed; left:50%; transform:translateX(-50%); bottom:96px;
    background:rgba(20,27,58,.95); border:1px solid rgba(167,139,250,.4);
    padding:8px 16px; border-radius:10px; font-size:14px; opacity:0; pointer-events:none;
    transition:opacity .25s;
  }
  #toast.show{opacity:1;}

  .overlay{
    z-index:10; position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(6,8,24,.82); backdrop-filter:blur(4px);
  }
  .overlay.show{display:flex;}
  .card{
    text-align:center; padding:26px 24px; border-radius:22px; max-width:360px; width:90%;
    background:linear-gradient(180deg,#1a2350,#10173a);
    border:1px solid rgba(255,209,102,.45);
    box-shadow:0 0 60px rgba(255,209,102,.18);
  }
  .card h2{margin:0 0 6px; font-size:24px; letter-spacing:.12em; color:var(--span); text-transform:uppercase;}
  .card p{margin:5px 0; color:var(--ink-dim); font-size:15px;}
  .card p b{color:var(--ink);}
  .card .streak-big{font-size:20px; color:var(--flame); font-weight:700; margin-top:10px;}
  .card .row{display:flex; gap:10px; justify-content:center; margin-top:16px; flex-wrap:wrap;}

  #pickerCard{border-color:rgba(125,211,252,.45); box-shadow:0 0 60px rgba(125,211,252,.14);}
  #pickerCard h2{color:var(--hint);}
  #pickerGrid{
    display:grid; grid-template-columns:repeat(7, 1fr); gap:7px;
    margin-top:12px; max-height:52vh; overflow-y:auto; padding:2px;
  }
  .pk{
    position:relative; aspect-ratio:1; border-radius:10px; border:1px solid rgba(154,166,207,.35);
    background:rgba(154,166,207,.08); color:var(--ink); font:inherit; font-size:13px; font-weight:700;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .pk:active{transform:scale(.93);}
  .pk.solved{background:rgba(94,230,201,.18); border-color:rgba(94,230,201,.55); color:var(--found);}
  .pk.solved::after{content:"\2713"; position:absolute; top:1px; right:4px; font-size:9px;}
  .pk.now{box-shadow:0 0 0 2px var(--span);}
</style>
</head>
<body>
<div id="stars" aria-hidden="true"></div>

<header>
  <h1>Star<span class="glow">light</span> Search</h1>
  <button id="meta" aria-label="choose a puzzle">Puzzle 1 / 50</button>
</header>

<div class="theme-card">
  <p class="eyebrow">Today's theme</p>
  <p class="theme" id="themeText">&hellip;</p>
</div>

<div id="currentRow">
  <button class="mini" id="clearBtn">Clear</button>
  <div id="current">&nbsp;</div>
</div>

<div id="board-wrap">
  <svg id="lines" aria-hidden="true"></svg>
  <div id="board" role="grid" aria-label="letter board"></div>
</div>

<div id="hud">
  <span id="progress"><b>0</b> of 7</span>
  <span id="streak">&#128293; 0</span>
  <button class="btn" id="hintBtn">Hint &middot; 3</button>
  <button class="btn" id="skipBtn">Skip</button>
  <button class="btn" id="soundBtn" aria-label="toggle sound">&#128266;</button>
</div>
<p id="howto">Swipe across neighboring letters, or tap them one by one &mdash; words lock in the moment you trace them.</p>

<div id="toast" role="status"></div>

<div id="win" class="overlay" aria-modal="true" role="dialog">
  <div class="card">
    <h2>Brilliant!</h2>
    <p id="winLine">You found every word.</p>
    <p><b id="winHints"></b></p>
    <p class="streak-big" id="winStreak"></p>
    <div class="row">
      <button class="btn" id="replayBtn">&#8634; Replay</button>
      <button class="btn" id="nextBtn">Next puzzle &#9656;</button>
    </div>
  </div>
</div>

<div id="picker" class="overlay" aria-modal="true" role="dialog">
  <div class="card" id="pickerCard">
    <h2>Choose a puzzle</h2>
    <p id="pickerSub"></p>
    <div id="pickerGrid"></div>
    <div class="row"><button class="btn" id="pickerClose">Close</button></div>
  </div>
</div>

/* ================= Sound (WebAudio, no files) ================= */
const Sound = (() => {
  let ctx = null, muted = false;
  function ensure(){
    if (!ctx){
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) ctx = new AC();
    }
    if (ctx && ctx.state === "suspended") ctx.resume();
    return ctx;
  }
  function tone(freq, t0, dur, type, vol, slide){
    const c = ensure(); if (!c || muted) return;
    const o = c.createOscillator(), g = c.createGain();
    o.type = type || "sine";
    o.frequency.setValueAtTime(freq, c.currentTime + t0);
    if (slide) o.frequency.exponentialRampToValueAtTime(slide, c.currentTime + t0 + dur);
    g.gain.setValueAtTime(0.0001, c.currentTime + t0);
    g.gain.exponentialRampToValueAtTime(vol || 0.18, c.currentTime + t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + t0 + dur);
    o.connect(g).connect(c.destination);
    o.start(c.currentTime + t0); o.stop(c.currentTime + t0 + dur + 0.05);
  }
  return {
    unlock: ensure,
    toggle(){ muted = !muted; return muted; },
    setMuted(m){ muted = !!m; },
    tick(n){ tone(420 * Math.pow(2, Math.min(n,12)/12), 0, 0.09, "sine", 0.14); },
    untick(){ tone(300, 0, 0.07, "sine", 0.10); },
    bad(){ tone(130, 0, 0.18, "square", 0.10, 90); },
    word(){ [523,659,784].forEach((f,i)=>tone(f, i*0.09, 0.16, "triangle", 0.16)); },
    spangram(){ [392,523,659,784,1047].forEach((f,i)=>tone(f, i*0.1, 0.22, "triangle", 0.18)); },
    hint(){ tone(880, 0, 0.12, "sine", 0.12); tone(1175, 0.13, 0.16, "sine", 0.12); },
    win(){
      [523,659,784,1047].forEach((f,i)=>tone(f, i*0.12, 0.2, "triangle", 0.16));
      [523,659,784,1047].forEach(f=>tone(f, 0.55, 0.55, "sine", 0.07));
    }
  };
})();

function buzz(pattern){
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch(e){}
}

/* ================= Persistence =================
   YouTube Playables save API first, then browser storage, then this
   session's memory. Saves: per-puzzle progress for ALL puzzles, the
   solved list, streak, best, current puzzle, and mute preference. */
const Store = {
  data: { streak: 0, best: 0, idx: 0, solved: [], prog: {}, muted: false },
  backend: "memory",
  async load(){
    if (window.ytgame && ytgame.game && ytgame.game.loadData){
      try {
        const raw = await ytgame.game.loadData();
        if (raw) Object.assign(this.data, JSON.parse(raw));
        this.backend = "ytgame";
        this.migrate();
        return;
      } catch(e){}
    }
    try {
      const raw = localStorage.getItem("starlight-save");
      if (raw) Object.assign(this.data, JSON.parse(raw));
      localStorage.setItem("starlight-save-probe", "1");
      localStorage.removeItem("starlight-save-probe");
      this.backend = "local";
    } catch(e){
      this.backend = "memory";   // sandboxed preview: progress lasts this session only
    }
    this.migrate();
  },
  migrate(){
    if (!this.data.prog) this.data.prog = {};
    if (this.data.cur && this.data.cur.idx != null){   // old single-slot save format
      this.data.prog[this.data.cur.idx] = this.data.cur;
      delete this.data.cur;
    }
    if (!Array.isArray(this.data.solved)) this.data.solved = [];
  },
  save(){
    const json = JSON.stringify(this.data);
    if (this.backend === "ytgame"){
      try { ytgame.game.saveData(json); return; } catch(e){}
    }
    if (this.backend === "local"){
      try { localStorage.setItem("starlight-save", json); } catch(e){}
    }
  }
};

/* ================= Game state ================= */
let puzzle, cur, cells = [], selection = [], foundCount = 0, hintsLeft = 3, hintsUsed = 0, solved = false;
const foundWords = new Set();
const hintedWords = new Set();
const isAdjacent = (a,b) => Math.abs(a[0]-b[0])<=1 && Math.abs(a[1]-b[1])<=1 && !(a[0]===b[0]&&a[1]===b[1]);
const isLocked = (r,c) => cells[r][c].classList.contains("found") || cells[r][c].classList.contains("spangram");
const selIndex = (r,c) => selection.findIndex(p => p[0]===r && p[1]===c);

function sizeBoard(){
  const w = Math.min(window.innerWidth, 520);
  const h = window.innerHeight;
  const cellW = (w - 32 - 5*8) / COLS;
  const cellH = (h - 318 - 7*8) / ROWS;
  const cell = Math.max(32, Math.min(cellW, cellH, 60));
  document.documentElement.style.setProperty("--cell", cell + "px");
  document.documentElement.style.setProperty("--gap", "8px");
  requestAnimationFrame(drawLines);
}
window.addEventListener("resize", sizeBoard);

function loadPuzzle(i){
  i = ((i % PUZZLES.length) + PUZZLES.length) % PUZZLES.length;
  Store.data.idx = i;
  puzzle = PUZZLES[i];
  selection = []; foundCount = 0; solved = false;
  foundWords.clear(); hintedWords.clear();

  if (!Store.data.prog[i]){
    Store.data.prog[i] = { idx: i, found: [], hinted: [], hintsLeft: 3, hintsUsed: 0 };
  }
  cur = Store.data.prog[i];
  hintsLeft = cur.hintsLeft; hintsUsed = cur.hintsUsed;
  Store.save();

  boardEl.innerHTML = ""; cells = [];
  for (let r = 0; r < ROWS; r++){
    cells.push([]);
    for (let c = 0; c < COLS; c++){
      const d = document.createElement("div");
      d.className = "cell";
      d.textContent = puzzle.grid[r][c];
      d.dataset.r = r; d.dataset.c = c;
      d.setAttribute("role","gridcell");
      boardEl.appendChild(d);
      cells[r].push(d);
    }
  }

  // quietly re-lock previously found words
  cur.found.forEach(name => {
    const w = puzzle.words.find(x => x.word === name);
    if (!w || foundWords.has(name)) return;
    foundWords.add(name); foundCount++;
    const cls = w.span ? "spangram" : "found";
    w.path.forEach(([r,c]) => cells[r][c].classList.add(cls));
  });
  // restore hint outlines for words still unfound
  cur.hinted.forEach(name => {
    if (foundWords.has(name)) return;
    hintedWords.add(name);
    const w = puzzle.words.find(x => x.word === name);
    if (w) w.path.forEach(([r,c]) => cells[r][c].classList.add("hinted"));
  });

  themeEl.textContent = puzzle.theme;
  refreshMeta();
  progressEl.innerHTML = `<b>${foundCount}</b> of ${puzzle.words.length}`;
  hintBtn.textContent = `Hint \u00b7 ${hintsLeft}`;
  hintBtn.disabled = hintsLeft === 0;
  if (foundCount === puzzle.words.length && puzzle.words.length){
    solved = true;
    showWin(false);     // finished before closing — show the result again
  } else {
    document.getElementById("win").classList.remove("show");
  }
  renderSelection();
  sizeBoard();
}

function refreshMeta(){
  const n = Store.data.solved.length;
  metaEl.textContent = `Puzzle ${Store.data.idx + 1} / ${PUZZLES.length}` + (n ? ` \u00b7 \u2713 ${n}` : "");
}

function refreshStreak(){
  streakEl.textContent = `\u{1F525} ${Store.data.streak}`;
  streakEl.title = `Best streak: ${Store.data.best}`;
}

function renderSelection(){
  document.querySelectorAll(".cell.selected,.cell.last").forEach(el => el.classList.remove("selected","last"));
  selection.forEach(([r,c], i) => {
    if (isLocked(r,c)) return;
    cells[r][c].classList.add("selected");
    if (i === selection.length - 1) cells[r][c].classList.add("last");
  });
  currentEl.textContent = selection.map(([r,c]) => puzzle.grid[r][c]).join("") || "\u00a0";
  currentEl.className = "";
  drawLines();
}

function drawLines(){
  const wrap = document.getElementById("board-wrap").getBoundingClientRect();
  linesEl.setAttribute("viewBox", `0 0 ${wrap.width-12} ${wrap.height-12}`);
  let d = "";
  selection.forEach(([r,c]) => {
    const b = cells[r][c].getBoundingClientRect();
    const x = b.left - wrap.left - 6 + b.width/2;
    const y = b.top  - wrap.top  - 6 + b.height/2;
    d += (d ? "L" : "M") + x + " " + y + " ";
  });
  linesEl.innerHTML = d
    ? `<path d="${d}" fill="none" stroke="var(--select)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>`
    : "";
}

/* ================= Input: tap AND swipe =================
   Tap: touch adjacent letters one by one; tap the last letter to undo;
   tap an earlier letter to trim back to it.
   Swipe: press and glide across letters; release to finish — if the
   trace didn't complete a word, it shakes and clears (a completed word
   locks in mid-swipe). */
let pressing = false, dragMoved = false, pendingUndo = false, lockedDuringDrag = false;
let geo = null;   // board geometry cached per press

function cellAt(x, y, strict){
  if (!geo) return null;
  const gx = x - geo.left, gy = y - geo.top;
  const c = Math.floor(gx / geo.step), r = Math.floor(gy / geo.step);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
  const cx = c * geo.step + geo.cell / 2, cy = r * geo.step + geo.cell / 2;
  const dist = Math.hypot(gx - cx, gy - cy);
  if (dist > geo.cell * (strict ? 0.45 : 0.55)) return null;  // stricter mid-swipe so corners don't graze
  return [r, c];
}

function extendTo(pos){
  const [r, c] = pos;
  if (isLocked(r, c)) return;
  if (selection.length >= 2){
    const prev = selection[selection.length - 2];
    if (prev[0] === r && prev[1] === c){       // backtracking over the previous letter
      selection.pop();
      Sound.untick();
      renderSelection();
      return;
    }
  }
  if (selIndex(r, c) !== -1) return;
  if (selection.length === 0 || isAdjacent(selection[selection.length - 1], pos)){
    selection.push(pos);
    Sound.tick(selection.length);
    renderSelection();
    checkAuto();
  }
}

boardEl.addEventListener("pointerdown", e => {
  Sound.unlock();
  const b = boardEl.getBoundingClientRect();
  const step = (b.width + 8) / COLS;             // cell + gap
  geo = { left: b.left, top: b.top, step, cell: step - 8 };
  const pos = cellAt(e.clientX, e.clientY, false);
  if (!pos) return;
  const [r, c] = pos;
  if (isLocked(r, c)) return;

  pressing = true; dragMoved = false; pendingUndo = false; lockedDuringDrag = false;
  try { boardEl.setPointerCapture(e.pointerId); } catch(err){}

  const idx = selIndex(r, c);
  if (idx !== -1){
    if (idx === selection.length - 1){
      pendingUndo = true;                        // maybe an undo tap, maybe the start of a swipe
    } else {
      selection = selection.slice(0, idx + 1);   // trim back, and a swipe can continue from here
      Sound.untick();
      renderSelection();
    }
    return;
  }
  if (selection.length > 0 && !isAdjacent(selection[selection.length - 1], pos)){
    selection = [];                              // non-adjacent press starts a fresh word
  }
  extendTo(pos);
});

boardEl.addEventListener("pointermove", e => {
  if (!pressing) return;
  const pos = cellAt(e.clientX, e.clientY, true);
  if (!pos) return;
  const last = selection[selection.length - 1];
  if (last && last[0] === pos[0] && last[1] === pos[1]) return;
  dragMoved = true;
  pendingUndo = false;
  const before = foundCount;
  extendTo(pos);
  if (foundCount > before) lockedDuringDrag = true;
});

window.addEventListener("pointerup", () => {
  if (!pressing) return;
  pressing = false;
  if (pendingUndo && !dragMoved){
    selection.pop();                             // it really was an undo tap
    Sound.untick();
    renderSelection();
    return;
  }
  // a swipe that ended without completing a word clears itself
  if (dragMoved && !lockedDuringDrag && selection.length > 1){
    Sound.bad();
    currentEl.className = "flash-bad";
    setTimeout(() => { selection = []; renderSelection(); }, 350);
  }
});

window.addEventListener("pointercancel", () => { pressing = false; });

document.getElementById("clearBtn").addEventListener("click", () => {
  if (!selection.length) return;
  selection = []; Sound.untick(); renderSelection();
});

/* ================= Auto-detection ================= */
function checkAuto(){
  const text = selection.map(([r,c]) => puzzle.grid[r][c]).join("");
  const match = puzzle.words.find(w => w.word === text && !foundWords.has(w.word));
  if (match){
    const sel = new Set(selection.map(([r,c]) => r+","+c));
    const real = match.path.every(([r,c]) => sel.has(r+","+c));
    if (real){ lockWord(match, text); return; }
    Sound.bad();                                  // safety net; boards are placement-unique
    currentEl.className = "flash-bad";
    toast(`${text} is on the board \u2014 but not there`);
    setTimeout(() => { selection = []; renderSelection(); }, 450);
    return;
  }
  const remaining = puzzle.words.filter(w => !foundWords.has(w.word));
  if (!remaining.length) return;
  const maxLen = Math.max(...remaining.map(w => w.word.length));
  if (text.length >= maxLen){
    Sound.bad();
    currentEl.className = "flash-bad";
    setTimeout(() => { selection = []; renderSelection(); }, 350);
  }
}

/* ================= Lock in a found word ================= */
function lockWord(match, text){
  foundWords.add(match.word);
  foundCount++;
  if (!cur.found.includes(match.word)) cur.found.push(match.word);
  Store.save();
  const cls = match.span ? "spangram" : "found";
  match.span ? Sound.spangram() : Sound.word();
  buzz(match.span ? [20, 40, 30] : 15);
  match.path.forEach(([r,c], i) => {
    const el = cells[r][c];
    el.classList.remove("selected","last","hinted");
    setTimeout(() => el.classList.add(cls, "pop"), i * 35);
  });
  selection = [];
  setTimeout(renderSelection, match.path.length * 35 + 50);
  currentEl.textContent = text;
  currentEl.className = "flash-good";
  progressEl.innerHTML = `<b>${foundCount}</b> of ${puzzle.words.length}`;
  toast(match.span ? "\u2726 The spangram!" : "Nice find!");
  if (foundCount === puzzle.words.length) setTimeout(win, match.path.length * 35 + 450);
}

/* ================= Hints ================= */
hintBtn.addEventListener("click", () => {
  if (hintsLeft <= 0 || solved) return;
  const fresh = w => !foundWords.has(w.word) && !hintedWords.has(w.word);
  const normal = puzzle.words.filter(w => fresh(w) && !w.span);
  const pool = normal.length ? normal : puzzle.words.filter(fresh);
  if (!pool.length){ toast("Every hidden word is already outlined"); return; }
  const pick = pool[Math.floor(Math.random()*pool.length)];
  hintedWords.add(pick.word);
  pick.path.forEach(([r,c]) => cells[r][c].classList.add("hinted"));
  hintsLeft--; hintsUsed++;
  cur.hinted.push(pick.word);
  cur.hintsLeft = hintsLeft;
  cur.hintsUsed = hintsUsed;
  Store.save();
  hintBtn.textContent = `Hint \u00b7 ${hintsLeft}`;
  if (hintsLeft === 0) hintBtn.disabled = true;
  Sound.hint();
  toast("These letters hide a word");
});

/* ================= Win / progression ================= */
function win(){
  solved = true;
  Store.data.streak++;
  if (Store.data.streak > Store.data.best) Store.data.best = Store.data.streak;
  if (!Store.data.solved.includes(Store.data.idx)) Store.data.solved.push(Store.data.idx);
  Store.save();
  refreshStreak();
  refreshMeta();
  Sound.win();
  buzz([20, 50, 20, 50, 40]);
  showWin(true);
  if (window.ytgame && ytgame.engagement && ytgame.engagement.sendScore){
    try { ytgame.engagement.sendScore({ value: Store.data.streak }); } catch(e){}
  }
}

function showWin(fresh){
  document.getElementById("winLine").textContent = `\u201C${puzzle.theme}\u201D \u2014 solved.`;
  document.getElementById("winHints").textContent =
    hintsUsed === 0 ? "A perfect, hint-free sky." : `Solved with ${hintsUsed} hint${hintsUsed>1?"s":""}.`;
  document.getElementById("winStreak").textContent =
    `\u{1F525} Streak: ${Store.data.streak}` + (fresh && Store.data.streak === Store.data.best && Store.data.best > 1 ? " \u2014 new best!" : "");
  document.getElementById("win").classList.add("show");
}

document.getElementById("nextBtn").addEventListener("click", () => {
  loadPuzzle(Store.data.idx + 1);
});

document.getElementById("replayBtn").addEventListener("click", () => {
  delete Store.data.prog[Store.data.idx];
  Store.data.solved = Store.data.solved.filter(n => n !== Store.data.idx);
  Store.save();
  loadPuzzle(Store.data.idx);
});

skipBtn.addEventListener("click", () => {
  if (!solved){
    if (Store.data.streak > 0) toast("Streak reset");
    Store.data.streak = 0;
    Store.save();
    refreshStreak();
  }
  loadPuzzle(Store.data.idx + 1);
});

soundBtn.addEventListener("click", () => {
  const m = Sound.toggle();
  soundBtn.textContent = m ? "\u{1F507}" : "\u{1F50A}";
  Store.data.muted = m;
  Store.save();
});

/* ================= Puzzle picker ================= */
const pickerEl = document.getElementById("picker");
metaEl.addEventListener("click", () => {
  const grid = document.getElementById("pickerGrid");
  grid.innerHTML = "";
  PUZZLES.forEach((p, i) => {
    const b = document.createElement("button");
    b.className = "pk" + (Store.data.solved.includes(i) ? " solved" : "") + (i === Store.data.idx ? " now" : "");
    b.textContent = i + 1;
    b.title = p.theme;
    b.addEventListener("click", () => {
      pickerEl.classList.remove("show");
      loadPuzzle(i);          // browsing never touches your streak
    });
    grid.appendChild(b);
  });
  document.getElementById("pickerSub").textContent =
    `${Store.data.solved.length} of ${PUZZLES.length} solved \u00b7 progress on every board is saved`;
  pickerEl.classList.add("show");
});
document.getElementById("pickerClose").addEventListener("click", () => pickerEl.classList.remove("show"));
pickerEl.addEventListener("click", e => { if (e.target === pickerEl) pickerEl.classList.remove("show"); });

/* ================= Toast ================= */
let toastTimer;
function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), 1600);
}

/* ================= Boot + YouTube Playables handshake ================= */
(async function boot(){
  await Store.load();
  Sound.setMuted(Store.data.muted);
  soundBtn.textContent = Store.data.muted ? "\u{1F507}" : "\u{1F50A}";
  refreshStreak();
  loadPuzzle(Store.data.idx);
  if (window.ytgame && ytgame.game){
    try {
      if (ytgame.game.firstFrameReady) ytgame.game.firstFrameReady();
      if (ytgame.game.gameReady) ytgame.game.gameReady();
    } catch(e){}
  }
})();
</script>
