<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Open Road Sports Movie Bracket</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #1a3b47; 
            --box-color: #d45d44; 
            --text-color: #fdf6e3; 
            --accent: #e9c46a;
            /* COMPACT RIGID MATH */
            --r1-h: 54px;
            --r2-h: 108px;
            --r3-h: 216px;
            --r4-h: 432px;
            --r5-h: 864px;
            --slot-h: 24px; 
            --internal-gap: 1px; 
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
        }

        header { text-align: center; margin-bottom: 10px; }
        h1 { color: var(--accent); text-transform: uppercase; margin: 0; font-size: 1.8rem; letter-spacing: 2px; }
        .theme { font-size: 1.1rem; color: var(--text-color); margin-bottom: 5px; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn {
            border: none; padding: 10px 20px; font-weight: bold; cursor: pointer;
            border-radius: 4px; color: white; text-transform: uppercase; font-size: 0.8rem;
        }
        .btn-save { background: var(--box-color); box-shadow: 0 3px #9c3d2a; }
        .btn-reset { background: #6c757d; box-shadow: 0 3px #495057; }

        #save-area {
            background-color: var(--bg-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bracket-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 1500px;
        }

        .side { display: flex; align-items: stretch; }
        .round { display: flex; flex-direction: column; width: 130px; margin: 0 3px; }

        .matchup {
            display: flex;
            flex-direction: column;
            width: 100%;
            padding: 0 3px;
        }

        /* PIXEL-PERFECT COMPACT CENTERING */
        .round-1 .matchup { height: var(--r1-h); padding-top: calc((var(--r1-h) - (var(--slot-h) * 2) - var(--internal-gap)) / 2); }
        .round-2 .matchup { height: var(--r2-h); padding-top: calc((var(--r2-h) - (var(--slot-h) * 2) - var(--internal-gap)) / 2); }
        .round-3 .matchup { height: var(--r3-h); padding-top: calc((var(--r3-h) - (var(--slot-h) * 2) - var(--internal-gap)) / 2); }
        .round-4 .matchup { height: var(--r4-h); padding-top: calc((var(--r4-h) - (var(--slot-h) * 2) - var(--internal-gap)) / 2); }
        .round-5 .matchup { height: var(--r5-h); padding-top: calc((var(--r5-h) - (var(--slot-h) * 2) - var(--internal-gap)) / 2); }

        .slot {
            background-color: var(--box-color);
            height: var(--slot-h);
            font-size: 0.55rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            border-radius: 2px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.4);
            text-transform: uppercase;
            line-height: 1;
            padding: 1px 3px;
            overflow: hidden;
            word-wrap: break-word;
        }
        .slot:first-child { margin-bottom: var(--internal-gap); }
        .slot:hover { filter: brightness(1.2); }
        .slot.winner { background-color: var(--accent); color: var(--bg-color); font-weight: bold; }
        
        .center-stage { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 220px; margin: 0 10px; }
        
        .finals-match {
            width: 180px; padding: 10px; border: 2px dashed var(--accent); border-radius: 6px;
            margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px;
        }

        .champ-box {
            width: 200px; height: 80px; background: var(--accent); color: var(--bg-color);
            display: flex; align-items: center; justify-content: center; font-weight: 900;
            border-radius: 6px; border: 4px solid white; font-size: 1.1rem; text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Open Road</h1>
        <div class="theme">MOVIE NIGHT BRACKET: "SPORTS"</div>
    </header>

    <div class="controls">
        <button class="btn btn-save" onclick="takeScreenshot()">Download Bracket</button>
        <button class="btn btn-reset" onclick="resetBracket()">Reset</button>
    </div>

    <div id="save-area">
        <div class="bracket-container">
            <div class="side">
                <div class="round round-1" id="L1"></div>
                <div class="round round-2" id="L2"></div>
                <div class="round round-3" id="L3"></div>
                <div class="round round-4" id="L4"></div>
                <div class="round round-5" id="L5"></div>
            </div>

            <div class="center-stage">
                <div style="font-size: 0.7rem; margin-bottom: 5px; letter-spacing: 2px; font-weight: bold;">FINALS</div>
                <div class="finals-match">
                    <div class="slot" id="FINAL-0" onclick="advanceToChamp(this)">?</div>
                    <div class="slot" id="FINAL-1" onclick="advanceToChamp(this)">?</div>
                </div>
                <div id="CHAMP" class="champ-box">CHAMPION</div>
            </div>

            <div class="side">
                <div class="round round-5" id="R5"></div>
                <div class="round round-4" id="R4"></div>
                <div class="round round-3" id="R3"></div>
                <div class="round round-2" id="R2"></div>
                <div class="round round-1" id="R1"></div>
            </div>
        </div>
    </div>

    <script>
        const moviesL = [
            ["Hoosiers", "Eddie's Million Dollar Cook-Off"], ["Rocky", "The Big Green"],
            ["Raging Bull", "Air Bud"], ["Million Dollar Baby", "The Luck of the Irish"],
            ["Warrior", "BASEketball"], ["Rush", "Rookie of the Year"],
            ["F1", "The Waterboy"], ["Field of Dreams", "Talladega Nights"],
            ["Moneyball", "Blades of Glory"], ["Creed", "Space Jam"],
            ["Remember the Titans", "Days of Thunder"], ["Miracle", "Bring It On"],
            ["Bull Durham", "The Fan"], ["Chariots of Fire", "Rad"],
            ["Friday Night Lights", "Rocky IV"], ["The Wrestler", "Cobb"]
        ];
        const moviesR = [
            ["The Karate Kid", "Cool Runnings"], ["Rounders", "White Men Can't Jump"],
            ["A League of Their Own", "We Are Marshall"], ["Major League", "Varsity Blues"],
            ["The Sandlot", "The Rookie"], ["Rudy", "The Color of Money"],
            ["McFarland, USA", "Grand Prix"], ["Coach Carter", "Eight Men Out"],
            ["I, Tonya", "For the Love of the Game"], ["Bend It Like Beckham", "42"],
            ["Jerry Maguire", "The Fighter"], ["Any Given Sunday", "The Natural"],
            ["Angels in the Outfield", "Bad News Bears"], ["The Mighty Ducks", "Caddyshack"],
            ["Ford v Ferrari", "Rocky II"], ["Dodgeball", "Happy Gilmore"]
        ];

        function init() {
            ['L','R'].forEach(side => {
                for(let r=1; r<=5; r++){
                    const container = document.getElementById(`${side}${r}`);
                    container.innerHTML = "";
                    const count = Math.pow(2, 5 - r);
                    for(let i=0; i<count; i++){
                        const m = (r === 1) ? (side === 'L' ? moviesL[i] : moviesR[i]) : ["", ""];
                        container.appendChild(createMatch(m[0], m[1], side, r, i));
                    }
                }
            });
            document.getElementById('FINAL-0').innerText = "?";
            document.getElementById('FINAL-1').innerText = "?";
            document.querySelectorAll('.finals-match .slot').forEach(s => s.classList.remove('winner'));
            document.getElementById('CHAMP').innerText = "CHAMPION";
        }

        function createMatch(t1, t2, side, round, matchIdx) {
            const div = document.createElement('div');
            div.className = 'matchup';
            div.innerHTML = `
                <div class="slot" id="${side}-${round}-${matchIdx}-0" onclick="advance('${side}', ${round}, ${matchIdx}, 0)">${t1 || ""}</div>
                <div class="slot" id="${side}-${round}-${matchIdx}-1" onclick="advance('${side}', ${round}, ${matchIdx}, 1)">${t2 || ""}</div>
            `;
            return div;
        }

        function advance(side, round, matchIdx, slotIdx) {
            const currentSlot = document.getElementById(`${side}-${round}-${matchIdx}-${slotIdx}`);
            const team = currentSlot.innerText;
            if (!team || team === "") return;

            currentSlot.parentElement.querySelectorAll('.slot').forEach(s => s.classList.remove('winner'));
            currentSlot.classList.add('winner');

            if (round === 5) {
                const finalIdx = (side === 'L') ? 0 : 1;
                const finalSlot = document.getElementById(`FINAL-${finalIdx}`);
                finalSlot.innerText = team;
                finalSlot.classList.remove('winner');
                return;
            }

            const target = document.getElementById(`${side}-${round + 1}-${Math.floor(matchIdx / 2)}-${matchIdx % 2}`);
            target.innerText = team;
            target.classList.remove('winner');
        }

        function advanceToChamp(el) {
            if (el.innerText === "?" || el.innerText === "") return;
            document.querySelectorAll('.finals-match .slot').forEach(s => s.classList.remove('winner'));
            el.classList.add('winner');
            document.getElementById('CHAMP').innerText = el.innerText;
        }

        function resetBracket() {
            if (confirm("Reset the Sports bracket?")) init();
        }

        async function takeScreenshot() {
            const area = document.getElementById('save-area');
            const canvas = await html2canvas(area, { backgroundColor: '#1a3b47', scale: 2 });
            const link = document.createElement('a');
            link.download = 'sports-bracket-compact.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        init();
    </script>
</body>
</html>
