<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tower Stack</title>
<style>
  :root {
    --bg: #262119;
    --panel: #362e24;
    --panel-deep: #2d261d;
    --ink: #d8cdb4;
    --ink-dim: #8d8268;
    --line: #4a4133;
    --shadow: #16120c;
    --accent: #d2ab62;
    --scrim: rgba(28, 24, 18, 0.72);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Courier New", ui-monospace, monospace;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    touch-action: none;
    overflow: hidden;
    position: fixed;
    inset: 0;
  }
  #wrap { position: absolute; inset: 0; }
  canvas { display: block; width: 100%; height: 100%; }

  #hud {
    position: absolute;
    top: calc(10px + env(safe-area-inset-top, 0px));
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    pointer-events: none;
  }
  #score {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--ink);
    text-shadow: 3px 3px 0 var(--shadow);
  }
  #best {
    position: absolute;
    top: calc(14px + env(safe-area-inset-top, 0px));
    left: 14px;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--ink-dim);
    pointer-events: none;
  }
  #mute, #zoneBtn {
    position: absolute;
    top: calc(10px + env(safe-area-inset-top, 0px));
    right: 12px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--ink-dim);
    background: var(--panel-deep);
    border: 2px solid var(--line);
    box-shadow: 2px 2px 0 var(--shadow);
    min-width: 44px;
    min-height: 36px;
    cursor: pointer;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: var(--scrim);
    text-align: center;
    padding: 20px;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: 26px;
    letter-spacing: 5px;
    font-weight: 700;
    text-shadow: 3px 3px 0 var(--shadow);
  }
  .overlay h1 span { color: var(--ink-dim); }
  .overlay .sub {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  .overlay .bigscore {
    font-size: 56px;
    font-weight: 700;
    text-shadow: 3px 3px 0 var(--shadow);
  }
  .overlay .tag {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--ink-dim);
  }
  .overlay button {
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--panel-deep);
    background: var(--ink);
    border: 2px solid var(--ink);
    box-shadow: 3px 3px 0 var(--shadow);
    padding: 14px 28px;
    min-height: 52px;
    cursor: pointer;
    margin-top: 8px;
  }
  .overlay button:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--shadow); }
  #newbest {
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }
  #newbest.hidden { display: none; }
  .diffrow { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; justify-content: center; }
  .diffrow button {
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--ink-dim);
    background: var(--panel-deep);
    border: 2px solid var(--line);
    box-shadow: 2px 2px 0 var(--shadow);
    padding: 10px 14px;
    min-height: 46px;
    cursor: pointer;
    margin-top: 0;
  }
  .diffrow button.on {
    color: var(--panel-deep);
    background: var(--ink-dim);
    border-color: var(--ink-dim);
  }
  .overlay .backlink {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-dim);
    text-decoration: none;
    margin-top: 10px;
  }
  .overlay .backlink:hover { color: var(--ink); }

  /* ---------------- leaderboard ---------------- */
  .hidden { display: none !important; }
  #lbBox {
    width: min(300px, 86vw);
    max-height: 32vh;
    overflow-y: auto;
    background: var(--panel-deep);
    border: 2px solid var(--line);
    box-shadow: 3px 3px 0 var(--shadow);
    padding: 10px 14px;
  }
  .lb-title {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  #lbRows { font-size: 13px; letter-spacing: 1px; line-height: 1.7; text-align: left; }
  .lb-dim { color: var(--ink-dim); font-size: 12px; letter-spacing: 1px; }
  .lb-row { display: flex; gap: 14px; }
  .lb-row .r { color: var(--ink-dim); min-width: 2.5ch; }
  .lb-row .s { margin-left: auto; }
  .lb-row.me { color: var(--accent); }
  #lbEntry { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .lb-slots { display: flex; gap: 10px; }
  .lb-slot { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .lb-slot button {
    width: 44px;
    min-height: 32px;
    padding: 2px;
    margin-top: 0;
    font-size: 11px;
    color: var(--ink-dim);
    background: var(--panel-deep);
    border: 2px solid var(--line);
    box-shadow: 2px 2px 0 var(--shadow);
  }
  .lb-letter {
    width: 44px;
    padding: 6px 0;
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    color: var(--accent);
    background: var(--panel);
    border: 2px solid var(--line);
    text-shadow: 2px 2px 0 var(--shadow);
  }
  .lb-slot.sel .lb-letter { border-color: var(--accent); }
  .diffrow button[data-d="hard"].on {
    background: #c75f33;
    border-color: #c75f33;
    color: #1c1812;
  }
  .diffrow button[data-d="extreme"].on {
    background: #b03030;
    border-color: #b03030;
    color: #1c1812;
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>

<div id="best">BEST 0</div>
<div id="hud"><div id="score"></div></div>
<button id="mute" aria-label="Toggle sound">&#128266;</button>
<button id="zoneBtn" style="right: 64px;" aria-label="Change style">&#127797;</button>

<div class="overlay" id="startOv">
  <h1>TOWER <span>STACK</span></h1>
  <div class="sub">Tap to drop the block<br>Land clean — overhang gets cut<br>Perfect drops grow the block back</div>
  <div class="diffrow" id="diffStart">
    <button data-d="easy">Easy</button>
    <button data-d="med" class="on">Medium</button>
    <button data-d="hard">Hard</button>
    <button data-d="extreme">Extreme</button>
  </div>
  <div class="diffrow" id="zoneRow">
    <button data-z="dusk" class="on">Dusk</button>
    <button data-z="neon">Neon</button>
    <button data-z="beach">Beach</button>
    <button data-z="retro">Retro</button>
  </div>
  <button id="startBtn">Tap to play</button>
  <a class="backlink" href="/index.html">&larr; The Arcade</a>
</div>

<div class="overlay hidden" id="overOv">
  <div class="sub">Tower collapsed at</div>
  <div class="bigscore" id="finalScore">0</div>
  <div class="tag" id="finalBest">BEST 0</div>
  <div id="newbest" class="hidden">★ New best ★</div>

  <div id="lbEntry" class="hidden">
    <div class="lb-dim">YOU MADE THE TOP 10 — ENTER YOUR INITIALS<br>THEN HIT AGAIN TO LOCK IT IN</div>
    <div class="lb-slots" id="lbSlots"></div>
  </div>

  <div id="lbBox">
    <div class="lb-title" id="lbTitle">TOP 10</div>
    <div id="lbRows" class="lb-dim">LOADING&hellip;</div>
  </div>

  <div class="diffrow" id="diffOver">
    <button data-d="easy">Easy</button>
    <button data-d="med" class="on">Medium</button>
    <button data-d="hard">Hard</button>
    <button data-d="extreme">Extreme</button>
  </div>
  <button id="againBtn">Again</button>
  <a class="backlink" href="/index.html">&larr; The Arcade</a>
</div>

<script src="/js/leaderboard.js"></script>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, dpr = 1;

  function resize() {
    dpr = Math.min(2, window.devicePixelRatio || 1);
    const oldW = W;
    W = window.innerWidth;
    H = window.innerHeight;
    // Keep the tower centered under the pivot when the window resizes/rotates
    if (oldW && W !== oldW && blocks.length) {
      const dx = (W - oldW) / 2;
      for (const b of blocks) b.x += dx;
      for (const d of debris) d.x += dx;
      if (cur && state === 'fall') cur.x += dx;
    }
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ---------------- zones: palette + living backdrop ----------------
  const shade = (c, f) => `rgb(${(c[0]*f)|0},${(c[1]*f)|0},${(c[2]*f)|0})`;
  const rgba = (c, a) => `rgba(${c[0]},${c[1]},${c[2]},${a})`;

  const ZONES = {
    dusk: {
      css: { '--bg':'#262119', '--panel':'#362e24', '--panel-deep':'#2d261d', '--ink':'#d8cdb4', '--ink-dim':'#8d8268', '--line':'#4a4133', '--shadow':'#16120c', '--accent':'#d2ab62', '--scrim':'rgba(28,24,18,0.72)' },
      bgTop: '#1c1812', bgBot: '#262119',
      groundTop: '#36402e', groundDeep: '#2d261d',
      blocks: [
        [210,171,98],  // sand
        [178,98,66],   // terracotta
        [143,174,74],  // moss
        [93,142,166],  // water
        [122,104,142], // dusk purple
        [110,103,92],  // stone
        [196,150,82],  // ochre
        [104,140,120], // sage
      ],
      spark: [233,173,92], accent: [210,171,98],
      rope: 'rgba(216,205,180,0.5)', guide: 'rgba(216,205,180,0.3)', pivot: '#8d8268'
    },
    neon: {
      css: { '--bg':'#0a0e1c', '--panel':'#131a30', '--panel-deep':'#0e1426', '--ink':'#d6e4ff', '--ink-dim':'#6d7ba3', '--line':'#27314f', '--shadow':'#05070f', '--accent':'#39d8ff', '--scrim':'rgba(5,8,18,0.74)' },
      bgTop: '#05070f', bgBot: '#101b38',
      groundTop: '#1b2547', groundDeep: '#121a33',
      blocks: [
        [57,216,255],  // cyan
        [255,64,190],  // magenta
        [120,255,68],  // lime
        [255,225,64],  // yellow
        [178,102,255], // violet
        [255,122,48],  // orange
        [64,255,192],  // mint
        [255,80,80],   // red
      ],
      spark: [130,240,255], accent: [57,216,255],
      rope: 'rgba(140,180,255,0.45)', guide: 'rgba(140,180,255,0.3)', pivot: '#4b5b8c'
    },
    beach: {
      css: { '--bg':'#0e4f6b', '--panel':'#0b4560', '--panel-deep':'#093a52', '--ink':'#eaf7fc', '--ink-dim':'#8ec3d6', '--line':'#1b6484', '--shadow':'#052733', '--accent':'#ffd66b', '--scrim':'rgba(6,40,54,0.68)' },
      bgTop: '#5fb7e8', bgBot: '#bfe8fa',
      groundTop: '#f0dcae', groundDeep: '#e2cb92',
      blocks: [
        [255,127,102], // coral
        [64,196,180],  // teal
        [255,200,87],  // mango
        [240,240,235], // shell
        [255,150,180], // hibiscus
        [92,190,110],  // palm green
        [120,190,235], // lagoon
        [250,170,90],  // sunset orange
      ],
      spark: [255,214,107], accent: [255,140,50],
      rope: 'rgba(60,90,110,0.5)', guide: 'rgba(45,70,90,0.35)', pivot: '#4d7d95'
    },
    retro: {
      css: { '--bg':'#8bac0f', '--panel':'#9bbc0f', '--panel-deep':'#8bac0f', '--ink':'#0f380f', '--ink-dim':'#306230', '--line':'#306230', '--shadow':'#0f380f', '--accent':'#0f380f', '--scrim':'rgba(155,188,15,0.82)' },
      bgTop: '#9bbc0f', bgBot: '#9bbc0f',
      groundTop: '#306230', groundDeep: '#0f380f',
      blocks: [
        [139,172,15],  // GB light
        [48,98,48],    // GB dark
      ],
      spark: [15,56,15], accent: [15,56,15],
      rope: 'rgba(15,56,15,0.6)', guide: 'rgba(15,56,15,0.35)', pivot: '#0f380f',
      quantize: true
    },
  };

  let zone = 'dusk';
  const Z = () => ZONES[zone];

  // scene state: stars twinkle, clouds drift, one shooting star, one tumbleweed
  let sceneT = Math.random() * 100;
  let stars = [], clouds = [];
  let shoot = null, shootNext = 6;
  let tumbleX = -9999, tumbleNext = 4;

  function initScene() {
    stars = []; clouds = [];
    shoot = null; shootNext = 4 + Math.random() * 8;
    tumbleX = -9999; tumbleNext = 3 + Math.random() * 6;
    const n = zone === 'neon' ? 70 : 40;
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random() * W, y: Math.random() * H * 1.4,
        r: 0.8 + Math.random() * 1.4,
        ph: Math.random() * Math.PI * 2,
        sp: 0.6 + Math.random() * 2.2,
        mars: false
      });
    }
    if (zone === 'neon' && stars.length > 8) { stars[8].mars = true; stars[8].r = 2.6; }
    const nc = zone === 'retro' ? 3 : 4;
    for (let i = 0; i < nc; i++) {
      clouds.push({
        x: Math.random() * W,
        y: 40 + Math.random() * H * 0.25,
        s: 0.7 + Math.random() * 0.8,
        v: 4 + Math.random() * 8
      });
    }
  }

  const ZONE_ICON = { dusk: '\u{1F335}', neon: '\u{1F319}', beach: '\u{1F334}', retro: '\u{1F47E}' };

  function applyZone(z) {
    zone = z;
    const css = ZONES[z].css;
    for (const k in css) document.documentElement.style.setProperty(k, css[k]);
    document.querySelectorAll('#zoneRow button').forEach(b => b.classList.toggle('on', b.dataset.z === z));
    document.getElementById('zoneBtn').textContent = ZONE_ICON[z];
    // recolor the standing tower and active block so a mid-game switch looks right
    try {
      const P = ZONES[z].blocks;
      blocks.forEach((b, i) => { b.c = P[i % P.length]; });
      if (cur) cur.c = P[blocks.length % P.length];
    } catch (e) { /* boot time: game state not created yet */ }
    initScene();
  }

  function drawCloud(c, fill, stroke) {
    const s = c.s;
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.arc(c.x, c.y, 15 * s, Math.PI * 0.5, Math.PI * 1.5);
    ctx.arc(c.x + 17 * s, c.y - 11 * s, 13 * s, Math.PI, Math.PI * 1.85);
    ctx.arc(c.x + 36 * s, c.y - 7 * s, 11 * s, Math.PI * 1.2, Math.PI * 1.95);
    ctx.arc(c.x + 50 * s, c.y, 13 * s, Math.PI * 1.5, Math.PI * 0.5);
    ctx.closePath();
    ctx.fill();
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
  }

  // Screen-space backdrop: sky bodies, stars, clouds
  function drawSceneSky() {
    const t = sceneT;
    if (zone === 'neon') {
      const starOff = camY * 0.25;
      for (const s of stars) {
        const sy = (((s.y - starOff) % (H * 1.4)) + H * 1.4) % (H * 1.4) - H * 0.2;
        const tw = reducedMotion ? 0.7 : 0.45 + 0.55 * (0.5 + 0.5 * Math.sin(t * s.sp + s.ph));
        if (s.mars) {
          ctx.fillStyle = `rgba(255,110,80,${0.6 + 0.4 * tw})`;
          ctx.shadowColor = '#ff6e50'; ctx.shadowBlur = 6;
          ctx.beginPath(); ctx.arc(s.x, sy, s.r, 0, Math.PI * 2); ctx.fill();
          ctx.shadowBlur = 0;
        } else {
          ctx.fillStyle = `rgba(214,228,255,${0.15 + 0.75 * tw})`;
          ctx.fillRect(s.x | 0, sy | 0, s.r, s.r);
        }
      }
      // the moon, craters and all
      const mx = W * 0.8, my = 90 - camY * 0.06;
      ctx.fillStyle = '#e8ecf5';
      ctx.shadowColor = '#c9d6ff'; ctx.shadowBlur = 30;
      ctx.beginPath(); ctx.arc(mx, my, 32, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(165,180,210,0.55)';
      ctx.beginPath(); ctx.arc(mx - 10, my - 6, 6, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(mx + 8, my + 10, 4.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(mx + 13, my - 12, 3, 0, Math.PI * 2); ctx.fill();
      // shooting star, every so often
      if (!reducedMotion) {
        if (shoot) {
          shoot.x += shoot.vx / 60; shoot.y += shoot.vy / 60; shoot.life -= 1 / 60;
          ctx.strokeStyle = `rgba(214,228,255,${Math.max(0, shoot.life * 1.4)})`;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(shoot.x, shoot.y);
          ctx.lineTo(shoot.x - shoot.vx * 0.07, shoot.y - shoot.vy * 0.07);
          ctx.stroke();
          if (shoot.life <= 0) { shoot = null; shootNext = 6 + Math.random() * 12; }
        } else if ((shootNext -= 1 / 60) <= 0) {
          shoot = { x: Math.random() * W * 0.7, y: 30 + Math.random() * H * 0.25, vx: 260 + Math.random() * 160, vy: 120 + Math.random() * 80, life: 0.7 };
        }
      }
    } else if (zone === 'beach') {
      // sun with glow
      const sx = W * 0.2, sy = 90 - camY * 0.05;
      const g = ctx.createRadialGradient(sx, sy, 6, sx, sy, 70);
      g.addColorStop(0, 'rgba(255,240,180,0.95)');
      g.addColorStop(0.35, 'rgba(255,224,130,0.5)');
      g.addColorStop(1, 'rgba(255,224,130,0)');
      ctx.fillStyle = g;
      ctx.fillRect(sx - 70, sy - 70, 140, 140);
      ctx.fillStyle = '#fff3c8';
      ctx.beginPath(); ctx.arc(sx, sy, 24, 0, Math.PI * 2); ctx.fill();
      for (const c of clouds) drawCloud(c, 'rgba(255,255,255,0.92)', null);
    } else if (zone === 'retro') {
      for (const c of clouds) drawCloud(c, '#9bbc0f', '#0f380f');
    } else {
      // dusk: a low sun that sinks as the tower climbs
      const sx = W * 0.74, sy = H * 0.5 - camY * 0.12;
      const g = ctx.createRadialGradient(sx, sy, 8, sx, sy, 90);
      g.addColorStop(0, 'rgba(255,190,110,0.9)');
      g.addColorStop(0.4, 'rgba(230,140,80,0.35)');
      g.addColorStop(1, 'rgba(230,140,80,0)');
      ctx.fillStyle = g;
      ctx.fillRect(sx - 90, sy - 90, 180, 180);
      ctx.fillStyle = '#f5c97e';
      ctx.beginPath(); ctx.arc(sx, sy, 30, 0, Math.PI * 2); ctx.fill();
      // dark clouds drifting across the sunset
      for (const c of clouds) drawCloud(c, 'rgba(58,44,34,0.85)', null);
      // stars emerge the higher you climb
      const alt = Math.min(0.7, Math.max(0, (-camY - H) / 2500));
      if (alt > 0.02) {
        const starOff = camY * 0.25;
        for (const s of stars) {
          const sy2 = (((s.y - starOff) % (H * 1.4)) + H * 1.4) % (H * 1.4) - H * 0.2;
          const tw = reducedMotion ? 1 : 0.6 + 0.4 * Math.sin(t * s.sp + s.ph);
          ctx.fillStyle = `rgba(216,205,180,${(alt * tw).toFixed(3)})`;
          ctx.fillRect(s.x | 0, sy2 | 0, 2, 2);
        }
      }
    }
  }

  function dunePath(baseY, h, freq, phase) {
    ctx.beginPath();
    ctx.moveTo(0, baseY);
    for (let x = 0; x <= W; x += 10) {
      ctx.lineTo(x, baseY - h * (0.5 + 0.5 * Math.sin(x * freq + phase)));
    }
    ctx.lineTo(W, baseY);
    ctx.closePath();
  }

  function drawPalm(px, baseY, dir, ph) {
    const sway = reducedMotion ? 0 : Math.sin(sceneT * 1.1 + ph) * 0.05;
    const topX = px + dir * 24 + sway * 42, topY = baseY - 86;
    ctx.strokeStyle = '#8a5a3b';
    ctx.lineWidth = 7;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(px, baseY);
    ctx.quadraticCurveTo(px + dir * 5, baseY - 48, topX, topY);
    ctx.stroke();
    ctx.strokeStyle = '#3f9c52';
    ctx.lineWidth = 5;
    for (let k = 0; k < 6; k++) {
      const a = -Math.PI * 0.9 + k * (Math.PI * 0.8 / 5) + sway;
      ctx.beginPath();
      ctx.moveTo(topX, topY);
      ctx.quadraticCurveTo(
        topX + Math.cos(a) * 26, topY + Math.sin(a) * 26 - 8,
        topX + Math.cos(a) * 46, topY + Math.sin(a) * 46 + 10
      );
      ctx.stroke();
    }
    ctx.fillStyle = '#6b4326';
    ctx.beginPath(); ctx.arc(topX - 5, topY + 3, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(topX + 5, topY + 4, 4, 0, Math.PI * 2); ctx.fill();
  }

  // World-space backdrop: drawn after the ground, behind the tower
  function drawSceneWorld() {
    if (zone === 'beach') {
      // ocean lapping behind the sand
      const oh = Math.min(H * 0.16, 120);
      const g = ctx.createLinearGradient(0, groundY - oh, 0, groundY);
      g.addColorStop(0, '#2f8fb8');
      g.addColorStop(1, '#57b6d9');
      ctx.fillStyle = g;
      ctx.fillRect(0, groundY - oh, W, oh);
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 2;
      for (let k = 0; k < 3; k++) {
        const wy = groundY - oh + oh * (0.3 + k * 0.28);
        ctx.beginPath();
        for (let x = 0; x <= W; x += 14) {
          const y = wy + Math.sin(x * 0.05 + sceneT * (1.1 + k * 0.3) + k * 2) * 2.5;
          if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
      drawPalm(W * 0.08, groundY + 4, 1, 0);
      drawPalm(W * 0.92, groundY + 4, -1, 2.1);
    } else if (zone === 'dusk') {
      // dune silhouettes on the horizon
      ctx.fillStyle = 'rgba(58,46,34,0.9)';
      dunePath(groundY, 26, 0.013, 0);
      ctx.fill();
      ctx.fillStyle = 'rgba(45,36,26,0.95)';
      dunePath(groundY, 14, 0.021, 40);
      ctx.fill();
      // a tumbleweed rolls by now and then
      if (!reducedMotion) {
        if (tumbleX < -9000) {
          if ((tumbleNext -= 1 / 60) <= 0) tumbleX = -40;
        } else {
          tumbleX += 2.4;
          const ty = groundY - 11 - Math.abs(Math.sin(tumbleX * 0.045)) * 9;
          ctx.strokeStyle = 'rgba(150,120,80,0.8)';
          ctx.lineWidth = 1.5;
          for (let k = 0; k < 5; k++) {
            ctx.beginPath();
            ctx.arc(tumbleX, ty, 3.5 + k * 2, k + tumbleX * 0.08, k + tumbleX * 0.08 + Math.PI * 1.3);
            ctx.stroke();
          }
          if (tumbleX > W + 60) { tumbleX = -9999; tumbleNext = 6 + Math.random() * 10; }
        }
      }
    } else if (zone === 'retro') {
      // GB bushes along the horizon
      ctx.fillStyle = '#306230';
      for (let x = 20; x < W; x += 95) {
        ctx.beginPath();
        ctx.arc(x, groundY, 13, Math.PI, 0);
        ctx.arc(x + 20, groundY, 17, Math.PI, 0);
        ctx.arc(x + 40, groundY, 11, Math.PI, 0);
        ctx.fill();
      }
    }
  }

  // Screen-space overlay: the GB LCD scanlines
  function drawSceneOverlay() {
    if (zone !== 'retro') return;
    ctx.fillStyle = 'rgba(15,56,15,0.07)';
    for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);
  }

  document.querySelectorAll('#zoneRow button').forEach(b => {
    b.addEventListener('click', e => {
      e.stopPropagation();
      applyZone(b.dataset.z);
      savePrefs();
    });
  });
  // HUD button cycles zones, any time — even mid-game
  document.getElementById('zoneBtn').addEventListener('click', e => {
    e.stopPropagation();
    const keys = Object.keys(ZONES);
    applyZone(keys[(keys.indexOf(zone) + 1) % keys.length]);
    savePrefs();
  });
  window.addEventListener('resize', initScene);
  applyZone(zone);

  // ---------------- audio ----------------
  let actx = null, muted = false;
  function audioInit() {
    if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
    if (actx && actx.state === 'suspended') actx.resume();
  }
  function beep(freq, dur, vol, type, when) {
    if (!actx || muted) return;
    const t0 = actx.currentTime + (when || 0);
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(t0); o.stop(t0 + dur);
  }
  const sndDrop    = () => beep(200, 0.06, 0.12);
  const sndLand    = (h) => beep(120 + Math.min(h * 2, 140), 0.10, 0.18, 'triangle'); // thud rises as the tower grows
  const sndTrim    = () => beep(90,  0.14, 0.15, 'sawtooth');
  const sndPerfect = () => { beep(660, 0.08, 0.14); beep(880, 0.10, 0.14, 'square', 0.07); };
  const sndOver    = () => { beep(300, 0.15, 0.16, 'sawtooth'); beep(200, 0.2, 0.16, 'sawtooth', 0.12); beep(120, 0.3, 0.16, 'sawtooth', 0.26); };
  const sndRecord  = () => { beep(523, 0.10, 0.15, 'triangle'); beep(659, 0.10, 0.15, 'triangle', 0.08); beep(784, 0.12, 0.15, 'triangle', 0.16); beep(1047, 0.22, 0.15, 'triangle', 0.24); };

  const muteBtn = document.getElementById('mute');
  muteBtn.addEventListener('click', e => {
    e.stopPropagation();
    muted = !muted;
    muteBtn.innerHTML = muted ? '&#128263;' : '&#128266;'; // 🔇 / 🔊
    muteBtn.style.opacity = muted ? 0.45 : 1;
    savePrefs();
  });

  // ---------------- game state ----------------
  const BLOCK_H = 32;

  // ---------------- difficulty ----------------
  // wScale: starting block width multiplier; grow: px restored on a perfect drop
  const DIFF = {
    easy:    { tol: 12, baseSpeed: 1.15, speedGrow: 0.030, speedCap: 1.1, baseAngle: 0.45, angleGrow: 0.0025, angleCap: 0.18, wScale: 1,    grow: 6 },
    med:     { tol: 7,  baseSpeed: 1.6,  speedGrow: 0.045, speedCap: 1.6, baseAngle: 0.55, angleGrow: 0.0040, angleCap: 0.25, wScale: 1,    grow: 6 },
    hard:    { tol: 4,  baseSpeed: 2.1,  speedGrow: 0.060, speedCap: 2.2, baseAngle: 0.62, angleGrow: 0.0055, angleCap: 0.30, wScale: 1,    grow: 6 },
    extreme: { tol: 2,  baseSpeed: 2.6,  speedGrow: 0.075, speedCap: 2.6, baseAngle: 0.70, angleGrow: 0.0070, angleCap: 0.35, wScale: 0.75, grow: 4 },
  };
  let diff = 'med';
  const D = () => DIFF[diff];

  let state = 'start';         // start | swing | fall | over
  let blocks = [];             // {x, y, w, c} world coords; y = top of block, down-positive
  let debris = [];             // {x, y, w, h, vx, vy, rot, vr, c}
  let particles = [];          // perfect-drop sparks {x,y,vx,vy,life}
  let cur = null;              // the active block
  let baseW = 0, groundY = 0;
  let swingT = 0, swingSpeed = 1.6, ropeLen = 0;
  let score = 0, combo = 0;

  // High scores persist across visits via localStorage
  const BEST_KEY = 'towerstack_bests';
  const bests = { easy: 0, med: 0, hard: 0, extreme: 0 };
  function loadBests() {
    try {
      const saved = JSON.parse(localStorage.getItem(BEST_KEY));
      if (saved && typeof saved === 'object') {
        for (const k of ['easy', 'med', 'hard', 'extreme']) {
          if (Number.isFinite(saved[k])) bests[k] = saved[k];
        }
      }
    } catch (e) { /* corrupt or unavailable storage — start fresh */ }
  }
  function saveBests() {
    try { localStorage.setItem(BEST_KEY, JSON.stringify(bests)); } catch (e) { /* private mode / full — ignore */ }
  }
  loadBests();

  // Tallest tower (blocks landed) per difficulty — drives the "BEST" line to beat
  const BESTH_KEY = 'towerstack_besth';
  const bestH = { easy: 0, med: 0, hard: 0, extreme: 0 };
  function loadBestH() {
    try {
      const saved = JSON.parse(localStorage.getItem(BESTH_KEY));
      if (saved && typeof saved === 'object') {
        for (const k of ['easy', 'med', 'hard', 'extreme']) {
          if (Number.isFinite(saved[k])) bestH[k] = saved[k];
        }
      }
    } catch (e) { /* start fresh */ }
  }
  function saveBestH() {
    try { localStorage.setItem(BESTH_KEY, JSON.stringify(bestH)); } catch (e) { /* ignore */ }
  }
  loadBestH();

  // Mute state and last-picked difficulty persist across visits too
  const PREF_KEY = 'towerstack_prefs';
  function loadPrefs() {
    try {
      const p = JSON.parse(localStorage.getItem(PREF_KEY));
      if (p && typeof p === 'object') {
        if (p.muted) {
          muted = true;
          muteBtn.innerHTML = '&#128263;';
          muteBtn.style.opacity = 0.45;
        }
        if (DIFF[p.diff]) setDiff(p.diff);
        if (ZONES[p.zone]) applyZone(p.zone);
      }
    } catch (e) { /* start fresh */ }
  }
  function savePrefs() {
    try { localStorage.setItem(PREF_KEY, JSON.stringify({ muted, diff, zone })); } catch (e) { /* ignore */ }
  }
  loadPrefs();
  let camY = 0, camTarget = 0;
  let shake = 0;
  let flashA = 0;              // perfect flash alpha
  let bestLineCrossed = false; // passed the previous record height this run
  let lineFlash = 0;           // BEST-line celebration flash

  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function reset() {
    blocks = []; debris = []; particles = [];
    score = 0; combo = 0;
    bestLineCrossed = false; lineFlash = 0;
    entryPending = false;
    hideEntry();
    baseW = Math.max(90, Math.min(W * 0.42, 170)) * D().wScale;
    groundY = 0;
    blocks.push({ x: (W - baseW) / 2, y: -BLOCK_H, w: baseW, c: Z().blocks[0] });
    swingT = 0;
    swingSpeed = D().baseSpeed;
    camY = camTarget = -H * 0.7;
    newCur();
    state = 'swing';
    updateScore();
  }

  function towerTopY() { return blocks[blocks.length - 1].y; }

  function newCur() {
    const top = blocks[blocks.length - 1];
    ropeLen = Math.min(H * 0.16, 120);
    cur = {
      w: top.w,
      x: 0, y: 0,
      vx: 0, vy: 0,
      c: Z().blocks[blocks.length % Z().blocks.length],
    };
    swingT = Math.random() * Math.PI * 2;
    state = 'swing';
  }

  // pendulum pivot in SCREEN space (fixed near top), block position derived
  function pivot() { return { x: W / 2, y: 60 }; }

  function updateScore() {
    document.getElementById('score').textContent = state === 'start' ? '' : score;
    document.getElementById('best').textContent = 'BEST ' + bests[diff] + ' · ' + diff.toUpperCase();
  }

  // ---------------- input ----------------
  function tap() {
    audioInit();
    if (state === 'swing') {
      // detach: convert screen position to world, keep momentum
      const p = pivot();
      const A = maxAngle();
      const th = A * Math.sin(swingT);
      const sx = p.x + ropeLen * Math.sin(th) - cur.w / 2;
      const sy = p.y + ropeLen * Math.cos(th);
      cur.x = sx;
      cur.y = sy + camY;          // world y
      // dx/dt of x = px + L·sin(A·sin(ωt)) — chain rule, true swing momentum
      cur.vx = ropeLen * Math.cos(th) * A * Math.cos(swingT) * swingSpeed;
      cur.vx = Math.max(-260, Math.min(260, cur.vx));
      cur.vy = 0;
      state = 'fall';
      sndDrop();
    }
  }
  function maxAngle() { return D().baseAngle + Math.min(D().angleCap, score * D().angleGrow); }

  window.addEventListener('pointerdown', e => {
    if (e.target.closest('button, a')) return;
    tap();
  });

  // Keyboard: Space/Enter drops the block (or starts/restarts from an overlay)
  window.addEventListener('keydown', e => {
    if (entryActive) { entryKey(e); return; } // initials picker owns the keyboard
    if (e.code !== 'Space' && e.code !== 'Enter') return;
    if (e.repeat) return;
    if (e.target instanceof Element && e.target.closest('button, a')) return; // native activation
    e.preventDefault();
    if (state === 'start') {
      document.getElementById('startBtn').click();
    } else if (state === 'over' && !document.getElementById('overOv').classList.contains('hidden')) {
      document.getElementById('againBtn').click();
    } else {
      tap();
    }
  });

  document.getElementById('startBtn').addEventListener('click', () => {
    audioInit();
    document.getElementById('startOv').classList.add('hidden');
    reset();
  });
  document.getElementById('againBtn').addEventListener('click', () => {
    audioInit();
    if (!lockInEntry()) return; // rejected initials — stay put until they're changed
    document.getElementById('overOv').classList.add('hidden');
    reset();
  });
  // difficulty selectors (both overlays stay in sync)
  function setDiff(d) {
    diff = d;
    document.querySelectorAll('#diffStart button, #diffOver button').forEach(b => {
      b.classList.toggle('on', b.dataset.d === d);
    });
    savePrefs();
    updateScore();
    // On the game-over screen, difficulty buttons also flip which board you see
    if (!document.getElementById('overOv').classList.contains('hidden')) {
      loadBoard(d);
      if (entryPending && d === playedDiff) {
        entryActive = true;
        lbEntry.classList.remove('hidden');
      } else {
        hideEntry();
      }
    }
  }
  document.querySelectorAll('#diffStart button, #diffOver button').forEach(b => {
    b.addEventListener('click', e => {
      e.stopPropagation(); // don't trigger the overlay's tap-to-play
      setDiff(b.dataset.d);
    });
  });

  // whole overlay is tappable, not just the button — mobile-friendly
  document.getElementById('startOv').addEventListener('click', e => {
    if (!e.target.closest('button, a')) document.getElementById('startBtn').click();
  });
  document.getElementById('overOv').addEventListener('click', e => {
    if (entryActive) return; // no tap-to-restart while entering initials
    if (!e.target.closest('button, a, #lbBox')) document.getElementById('againBtn').click();
  });

  // ---------------- landing ----------------
  function land() {
    const top = blocks[blocks.length - 1];
    const restY = top.y - BLOCK_H;
    const left = Math.max(cur.x, top.x);
    const right = Math.min(cur.x + cur.w, top.x + top.w);
    const overlap = right - left;

    if (overlap <= 4) {
      // total miss — block tumbles, game over
      debris.push({ x: cur.x, y: cur.y, w: cur.w, h: BLOCK_H, vx: cur.vx * 0.4, vy: cur.vy, rot: 0, vr: (Math.random() - 0.5) * 6, c: cur.c });
      gameOver();
      return;
    }

    const offset = Math.abs((cur.x + cur.w / 2) - (top.x + top.w / 2));
    let newW, newX;

    if (offset <= D().tol) {
      // perfect: snap, regrow, celebrate
      newX = top.x; newW = top.w;
      combo++;
      newW = Math.min(baseW, newW + D().grow);
      newX = top.x + (top.w - newW) / 2;
      score += 1 + Math.min(combo, 5); // combo bonus
      flashA = 0.5;
      shake = Math.min(8, 3 + combo);
      sndPerfect();
      if (navigator.vibrate) navigator.vibrate(15); // felt on Android; ignored elsewhere
      for (let k = 0; k < 14; k++) {
        particles.push({
          x: newX + Math.random() * newW, y: restY,
          vx: (Math.random() - 0.5) * 160, vy: -60 - Math.random() * 120,
          life: 0.6 + Math.random() * 0.3
        });
      }
    } else {
      // trim the overhang
      combo = 0;
      newX = left; newW = overlap;
      score += 1;
      // debris: the cut piece
      if (cur.x < left) {
        debris.push({ x: cur.x, y: restY, w: left - cur.x, h: BLOCK_H, vx: -60 - Math.random() * 60, vy: -40, rot: 0, vr: -3 - Math.random() * 3, c: cur.c });
      }
      if (cur.x + cur.w > right) {
        debris.push({ x: right, y: restY, w: cur.x + cur.w - right, h: BLOCK_H, vx: 60 + Math.random() * 60, vy: -40, rot: 0, vr: 3 + Math.random() * 3, c: cur.c });
      }
      shake = 2;
      sndTrim();
    }
    blocks.push({ x: newX, y: restY, w: newW, c: cur.c });
    const h = blocks.length - 1;
    sndLand(h);

    // Celebrate passing the previous record height
    if (!bestLineCrossed && bestH[diff] > 0 && h > bestH[diff]) {
      bestLineCrossed = true;
      lineFlash = 1;
      sndRecord();
    }

    swingSpeed = D().baseSpeed + Math.min(D().speedCap, blocks.length * D().speedGrow);
    camTarget = restY - H * 0.62;
    updateScore();

    if (newW < 8) { gameOver(); return; } // too thin to continue
    newCur();
  }

  function gameOver() {
    state = 'over';
    sndOver();
    shake = 10;
    const h = blocks.length - 1; // blocks landed on top of the base
    if (h > bestH[diff]) { bestH[diff] = h; saveBestH(); }
    if (score > bests[diff]) {
      bests[diff] = score;
      saveBests();
      document.getElementById('newbest').classList.remove('hidden');
    } else {
      document.getElementById('newbest').classList.add('hidden');
    }
    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalBest').textContent = 'BEST ' + bests[diff] + ' · ' + diff.toUpperCase();
    updateScore();
    setTimeout(() => document.getElementById('overOv').classList.remove('hidden'), 650);

    // leaderboard: show this difficulty's board; offer initials entry if the run made it
    hideEntry();
    entryPending = false;
    (async () => {
      const d = diff, sc = score;
      const top = await loadBoard(d);
      if (top && window.ArcadeLB.qualifies(top, sc)) showEntry(d, sc);
    })();
  }

  /* ---------------- leaderboard ---------------- */
  const LB_OK = typeof window.ArcadeLB === 'object';
  const lbTitle = document.getElementById('lbTitle');
  const lbRows = document.getElementById('lbRows');
  const lbEntry = document.getElementById('lbEntry');
  const lbSlots = document.getElementById('lbSlots');
  const INITIALS_KEY = 'towerstack_initials';
  const BAD_INITIALS = ['ASS', 'SEX', 'FUK', 'FUC', 'FCK', 'SHT', 'DIK', 'DCK', 'CUM', 'TIT', 'FAG', 'NIG', 'KKK', 'CNT'];
  const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ '; // blank comes after Z, arcade-style
  const INI_RE = /^[A-Z ][A-Z ][A-Z ]$/;
  let entryActive = false;     // initials picker is on screen and owns input
  let entryPending = false;    // qualified this run but not submitted yet
  let entrySel = 0;
  let entryLetters = ['A', 'A', 'A'];
  let playedDiff = null;       // difficulty of the run awaiting initials
  let playedScore = 0;
  let lbReq = 0;               // token so stale board loads can't clobber newer ones

  const lbBoard = d => 'towerstack-' + d;

  function lbMsg(text) {
    lbRows.textContent = text;
    lbRows.classList.add('lb-dim');
  }

  function renderBoard(top, hl) {
    if (!top.length) { lbMsg('NO SCORES YET — BE THE FIRST'); return; }
    lbRows.classList.remove('lb-dim');
    lbRows.innerHTML = '';
    let hlDone = false;
    top.forEach((e, i) => {
      const row = document.createElement('div');
      row.className = 'lb-row';
      const ini = INI_RE.test(e.initials) ? e.initials : '???';
      const r = document.createElement('span'); r.className = 'r'; r.textContent = (i + 1) + '.';
      const n = document.createElement('span'); n.textContent = ini.replace(/ /g, '\u00A0');
      const s = document.createElement('span'); s.className = 's'; s.textContent = e.score;
      if (hl && !hlDone && ini === hl.initials && e.score === hl.score) {
        row.classList.add('me');
        hlDone = true;
      }
      row.append(r, n, s);
      lbRows.appendChild(row);
    });
  }

  async function loadBoard(d, hl) {
    lbTitle.textContent = 'TOP 10 · ' + d.toUpperCase();
    if (!LB_OK) { lbMsg('LEADERBOARD OFFLINE'); return null; }
    const req = ++lbReq;
    lbMsg('LOADING…');
    try {
      const top = await window.ArcadeLB.fetchTop(lbBoard(d));
      if (req !== lbReq) return null; // superseded by a newer load
      renderBoard(top, hl);
      return top;
    } catch (e) {
      if (req === lbReq) lbMsg('LEADERBOARD OFFLINE');
      return null;
    }
  }

  function buildSlots() {
    lbSlots.innerHTML = '';
    entryLetters.forEach((ch, i) => {
      const slot = document.createElement('div');
      slot.className = 'lb-slot' + (i === entrySel ? ' sel' : '');
      const up = document.createElement('button');
      up.textContent = '▲';
      const letter = document.createElement('div');
      letter.className = 'lb-letter';
      letter.textContent = ch === ' ' ? '\u00A0' : ch; // blank renders as an empty box
      const dn = document.createElement('button');
      dn.textContent = '▼';
      up.addEventListener('click', e => { e.stopPropagation(); cycleLetter(i, 1); });
      dn.addEventListener('click', e => { e.stopPropagation(); cycleLetter(i, -1); });
      slot.addEventListener('click', () => { entrySel = i; buildSlots(); });
      slot.append(up, letter, dn);
      lbSlots.appendChild(slot);
    });
  }

  function cycleLetter(i, dir) {
    const c = LETTERS.indexOf(entryLetters[i]);
    entryLetters[i] = LETTERS[(c + dir + LETTERS.length) % LETTERS.length];
    entrySel = i;
    buildSlots();
    beep(330 + i * 40, 0.03, 0.05);
  }

  function showEntry(d, sc) {
    playedDiff = d;
    playedScore = sc;
    try {
      const saved = localStorage.getItem(INITIALS_KEY);
      if (saved && INI_RE.test(saved)) entryLetters = saved.split('');
    } catch (e) { /* ignore */ }
    entrySel = 0;
    entryActive = true;
    entryPending = true;
    buildSlots();
    lbEntry.classList.remove('hidden');
  }

  function hideEntry() {
    entryActive = false;
    lbEntry.classList.add('hidden');
  }

  /* Lock in the pending entry. Called by AGAIN, which both posts the score
     and starts the next round. Returns false if the initials were rejected,
     so the caller stays on the entry screen instead of restarting. */
  function lockInEntry() {
    if (!entryPending) return true;
    const ini = entryLetters.join('');
    if (BAD_INITIALS.indexOf(ini) !== -1) {
      entryLetters = [' ', ' ', ' '];
      entrySel = 0;
      buildSlots();
      return false;
    }
    const board = lbBoard(playedDiff);
    const sc = playedScore;
    entryPending = false;
    hideEntry();
    try { localStorage.setItem(INITIALS_KEY, ini); } catch (e) { /* ignore */ }
    // Fire and forget: the next round starts now, the post lands in the background
    if (LB_OK) window.ArcadeLB.submit(board, ini, sc).catch(() => {});
    return true;
  }

  // Arrow keys / typing drive the initials picker
  function entryKey(e) {
    if (e.target instanceof Element && e.target.closest('button') &&
        (e.code === 'Enter' || e.code === 'Space')) return; // focused buttons activate natively
    if (e.code === 'ArrowUp') { e.preventDefault(); cycleLetter(entrySel, 1); }
    else if (e.code === 'ArrowDown') { e.preventDefault(); cycleLetter(entrySel, -1); }
    else if (e.code === 'ArrowLeft') { e.preventDefault(); entrySel = (entrySel + 2) % 3; buildSlots(); }
    else if (e.code === 'ArrowRight') { e.preventDefault(); entrySel = (entrySel + 1) % 3; buildSlots(); }
    else if (e.code === 'Enter') { e.preventDefault(); document.getElementById('againBtn').click(); }
    else if (e.code === 'Space') { e.preventDefault(); entryLetters[entrySel] = ' '; entrySel = (entrySel + 1) % 3; buildSlots(); }
    else if (e.code === 'Backspace') { e.preventDefault(); entrySel = (entrySel + 2) % 3; entryLetters[entrySel] = ' '; buildSlots(); }
    else if (/^[a-zA-Z]$/.test(e.key)) { e.preventDefault(); entryLetters[entrySel] = e.key.toUpperCase(); entrySel = (entrySel + 1) % 3; buildSlots(); }
  }

  // ---------------- update ----------------
  let last = performance.now();
  function update(dt) {
    if (state === 'swing') {
      swingT += dt * swingSpeed;
    }
    if (state === 'fall') {
      cur.vy += 1400 * dt;
      cur.x += cur.vx * dt;
      cur.y += cur.vy * dt;
      const restY = towerTopY() - BLOCK_H;
      if (cur.y >= restY) { cur.y = restY; land(); }
    }
    // camera ease
    camY += (camTarget - camY) * Math.min(1, dt * 5);

    // debris
    for (let i = debris.length - 1; i >= 0; i--) {
      const d = debris[i];
      d.vy += 1400 * dt;
      d.x += d.vx * dt; d.y += d.vy * dt; d.rot += d.vr * dt;
      if (d.y - camY > H + 200) debris.splice(i, 1);
    }
    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.vy += 900 * dt;
      p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
    if (flashA > 0) flashA = Math.max(0, flashA - dt * 1.6);
    if (lineFlash > 0) lineFlash = Math.max(0, lineFlash - dt * 1.1);
    if (shake > 0.3) shake *= Math.pow(0.0001, dt); else shake = 0;
  }

  // ---------------- render ----------------
  function drawBlock(x, y, w, h, c) {
    if (Z().quantize) {
      // Game Boy mode: flat four-shade fills, no smooth gradients
      ctx.fillStyle = `rgb(${c[0]},${c[1]},${c[2]})`;
      ctx.fillRect(x | 0, y | 0, w | 0, h | 0);
      ctx.fillStyle = '#9bbc0f';
      ctx.fillRect(x | 0, y | 0, w | 0, 2);
      ctx.strokeStyle = '#0f380f';
      ctx.lineWidth = 2;
      ctx.strokeRect((x | 0) + 1, (y | 0) + 1, (w | 0) - 2, (h | 0) - 2);
      return;
    }
    ctx.fillStyle = shade(c, 1);
    ctx.fillRect(x | 0, y | 0, w | 0, h | 0);
    // pixel-style bevel
    ctx.fillStyle = shade(c, 1.18);
    ctx.fillRect(x | 0, y | 0, w | 0, 3);
    ctx.fillStyle = shade(c, 0.7);
    ctx.fillRect(x | 0, (y + h - 3) | 0, w | 0, 3);
    ctx.fillStyle = shade(c, 0.55);
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 2;
    ctx.strokeRect((x | 0) + 1, (y | 0) + 1, (w | 0) - 2, (h | 0) - 2);
  }

  function render() {
    // sky
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, Z().bgTop);
    grad.addColorStop(1, Z().bgBot);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // living backdrop (stars, moon, sun, clouds — per zone)
    drawSceneSky();

    ctx.save();
    if (shake > 0 && !reducedMotion) {
      ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    }
    ctx.translate(0, -camY);

    // ground
    ctx.fillStyle = Z().groundTop;
    ctx.fillRect(0, groundY, W, 6);
    ctx.fillStyle = Z().groundDeep;
    ctx.fillRect(0, groundY + 6, W, H);

    // world-space scenery (ocean, dunes, bushes) behind the tower
    drawSceneWorld();

    // previous best height — a dashed line to aim for; celebrates when you pass it
    if (bestH[diff] > 0 && blocks.length) {
      const lineY = -(bestH[diff] + 1) * BLOCK_H; // top surface of the record tower
      const lineA = Math.min(1, (bestLineCrossed ? 0.85 : 0.5) + lineFlash * 0.15);
      ctx.strokeStyle = rgba(Z().accent, lineA);
      ctx.lineWidth = 2 + lineFlash * 2;
      ctx.setLineDash([6, 6]);
      ctx.beginPath();
      ctx.moveTo(0, lineY);
      ctx.lineTo(W, lineY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.font = '700 11px "Courier New", monospace';
      ctx.textAlign = 'right';
      ctx.fillStyle = rgba(Z().accent, Math.min(1, (bestLineCrossed ? 0.95 : 0.75) + lineFlash * 0.05));
      ctx.fillText(bestLineCrossed ? 'NEW BEST' : 'BEST', W - 10, lineY - 6);
    }

    // tower
    for (const b of blocks) drawBlock(b.x, b.y, b.w, BLOCK_H, b.c);

    // debris (rotating)
    for (const d of debris) {
      ctx.save();
      ctx.translate(d.x + d.w / 2, d.y + d.h / 2);
      ctx.rotate(d.rot);
      drawBlock(-d.w / 2, -d.h / 2, d.w, d.h, d.c);
      ctx.restore();
    }

    // particles
    ctx.fillStyle = rgba(Z().spark, 1);
    for (const p of particles) {
      if (p.life > 0) ctx.fillRect(p.x | 0, p.y | 0, 3, 3);
    }

    // falling block
    if (state === 'fall') drawBlock(cur.x, cur.y, cur.w, BLOCK_H, cur.c);
    ctx.restore();

    // pendulum block + rope in screen space
    if (state === 'swing') {
      const p = pivot();
      const th = maxAngle() * Math.sin(swingT);
      const bx = p.x + ropeLen * Math.sin(th) - cur.w / 2;
      const by = p.y + ropeLen * Math.cos(th);
      ctx.strokeStyle = Z().rope;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(bx + cur.w / 2, by);
      ctx.stroke();
      ctx.fillStyle = Z().pivot;
      ctx.fillRect(p.x - 4, p.y - 4, 8, 8);
      drawBlock(bx, by, cur.w, BLOCK_H, cur.c);
      // drop guide: dotted line down from block edges
      ctx.strokeStyle = Z().guide;
      ctx.setLineDash([3, 6]);
      ctx.beginPath();
      ctx.moveTo(bx, by + BLOCK_H); ctx.lineTo(bx, H);
      ctx.moveTo(bx + cur.w, by + BLOCK_H); ctx.lineTo(bx + cur.w, H);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // perfect flash
    if (flashA > 0) {
      ctx.fillStyle = rgba(Z().spark, flashA);
      ctx.fillRect(0, 0, W, H);
    }

    // combo label
    if (combo >= 2 && state !== 'over') {
      ctx.font = '700 16px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = rgba(Z().accent, 1);
      ctx.fillText('PERFECT ×' + combo, W / 2, 110);
    }

    // zone overlay effects (GB scanlines)
    drawSceneOverlay();
  }

  // ---------------- loop ----------------
  function loop(now) {
    let dt = (now - last) / 1000;
    last = now;
    dt = Math.min(dt, 0.033);
    // scene clock runs even on the start screen so backdrops stay alive
    sceneT += dt;
    if (!reducedMotion) {
      for (const c of clouds) {
        c.x += c.v * dt;
        if (c.x > W + 90) c.x = -90;
      }
    }
    if (state !== 'start') update(dt);
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
  updateScore();
})();
</script>
</body>
</html>
