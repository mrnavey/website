<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loose Wires</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --panel-edge: #334155;
            --ink: #e2e8f0;
            --ink-dim: #94a3b8;
            --live: #22d3ee; /* cyan — powered wires */
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--ink);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px 40px;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        a.back {
            align-self: flex-start;
            font-family: 'Silkscreen', monospace;
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--ink-dim);
            text-decoration: none;
        }
        a.back:hover { color: var(--ink); }

        h1 {
            font-family: 'Silkscreen', monospace;
            font-weight: 700;
            font-size: clamp(22px, 5vw, 34px);
            margin: 14px 0 4px;
            color: var(--live);
            text-shadow: 0 0 18px rgba(34, 211, 238, 0.35);
        }

        .hint {
            font-size: 14px;
            color: var(--ink-dim);
            margin: 0 0 18px;
            text-align: center;
        }

        .hud {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 16px;
        }

        .hud .moves {
            font-family: 'Silkscreen', monospace;
            font-size: 12px;
            letter-spacing: 0.1em;
            color: var(--ink-dim);
            min-width: 110px;
            text-align: center;
        }
        .hud .moves b { color: var(--ink); }

        button {
            font-family: 'Silkscreen', monospace;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-dim);
            background: var(--panel);
            border: 1px solid var(--panel-edge);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            transition: color 0.15s ease, border-color 0.15s ease;
        }
        button:hover { color: var(--ink); border-color: var(--ink-dim); }
        button:focus-visible { outline: 2px solid var(--live); outline-offset: 2px; }
        button.active {
            color: var(--live);
            border-color: var(--live);
        }

        .board-wrap { position: relative; }

        canvas {
            display: block;
            background: var(--panel);
            border: 1px solid var(--panel-edge);
            border-radius: 14px;
            cursor: pointer;
            transition: border-color 0.4s ease, box-shadow 0.6s ease;
        }

        /* The board itself glows once the grid comes online */
        canvas.won {
            border-color: rgba(34, 211, 238, 0.7);
            box-shadow: 0 0 44px rgba(34, 211, 238, 0.28);
        }

        /* Win overlay */
        .win {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: rgba(15, 23, 42, 0.82);
            border-radius: 14px;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transform: scale(1.06);
            transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.2, 1.4, 0.4, 1);
        }
        .win.show {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }
        .win h2 {
            font-family: 'Silkscreen', monospace;
            font-size: clamp(20px, 5vw, 30px);
            color: var(--live);
            margin: 0;
            text-shadow: 0 0 24px rgba(34, 211, 238, 0.6);
            animation: winpulse 1.4s ease-in-out infinite;
        }
        .win p {
            font-size: 15px;
            color: var(--ink-dim);
            margin: 0;
        }
        .win button {
            color: var(--live);
            border-color: var(--live);
        }
        @keyframes winpulse {
            50% { text-shadow: 0 0 6px rgba(34, 211, 238, 0.25); }
        }
        @media (prefers-reduced-motion: reduce) {
            .win h2 { animation: none; }
            .win, canvas { transition: none; }
        }
    </style>
</head>
<body>
    <a class="back" href="/index.html">&larr; The Arcade</a>
    <h1>Loose Wires</h1>
    <p class="hint">Tap a tile to rotate it. Reconnect every wire to the core.</p>

    <div class="hud">
        <button data-size="5" class="sizeBtn">5&times;5</button>
        <button data-size="7" class="sizeBtn active">7&times;7</button>
        <button data-size="9" class="sizeBtn">9&times;9</button>
        <span class="moves">Moves: <b id="moveCount">0</b></span>
        <button id="newBtn">New puzzle</button>
    </div>

    <div class="board-wrap">
        <canvas id="board"></canvas>
        <div class="win" id="winOverlay">
            <h2>GRID ONLINE</h2>
            <p id="winStats"></p>
            <button id="againBtn">Next puzzle</button>
        </div>
    </div>

    <script>
        "use strict";

        /* ---------- Constants ---------- */
        // Direction bitmask: N=1, E=2, S=4, W=8
        const N = 1, E = 2, S = 4, W = 8;
        const DIRS = [
            { bit: N, dx: 0, dy: -1, opp: S },
            { bit: E, dx: 1, dy: 0, opp: W },
            { bit: S, dx: 0, dy: 1, opp: N },
            { bit: W, dx: -1, dy: 0, opp: E }
        ];

        const COLOR = {
            wireDead: "#475569",
            wireLive: "#22d3ee",
            coreRing: "#e2e8f0",
            bulbDead: "#334155",
            gridLine: "rgba(51, 65, 85, 0.35)"
        };

        const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        /* ---------- State ---------- */
        let size = 7;                // board is size x size
        let tiles = [];              // { mask, rot, displayRot, isLeaf }
        let source = 0;              // index of the core tile
        let connected = new Set();   // indices currently powered
        let moves = 0;
        let solved = false;
        let winAnim = null;          // { start, dur, depths, maxDepth, popped, popT }
        let particles = [];          // spark particles from bulbs during the win surge
        let flashT = [];             // per-tile time it last became powered (for a brief flash)

        const canvas = document.getElementById("board");
        const ctx = canvas.getContext("2d");
        const moveEl = document.getElementById("moveCount");
        const winOverlay = document.getElementById("winOverlay");
        const winStats = document.getElementById("winStats");

        let cssSize = 0;   // canvas CSS pixels (square)
        let cell = 0;      // tile size in CSS pixels

        /* ---------- Helpers ---------- */
        const idx = (x, y) => y * size + x;
        const inBounds = (x, y) => x >= 0 && x < size && y >= 0 && y < size;

        // Rotate a connection mask 90° clockwise, `steps` times
        function rotateMask(mask, steps) {
            for (let i = 0; i < ((steps % 4) + 4) % 4; i++) {
                mask = ((mask << 1) & 15) | (mask >> 3);
            }
            return mask;
        }

        function currentMask(t) {
            return rotateMask(t.mask, t.rot);
        }

        function popcount(m) {
            let c = 0;
            while (m) { c += m & 1; m >>= 1; }
            return c;
        }

        /* ---------- Puzzle generation ----------
           1. Build a random spanning tree over the grid (iterative DFS).
              Every tile is reachable, no loops → solvable by construction.
           2. Record each tile's connections as a bitmask.
           3. Scramble every tile's rotation.
        ------------------------------------------ */
        function generate() {
            const total = size * size;
            const masks = new Array(total).fill(0);
            const visited = new Array(total).fill(false);

            const startX = Math.floor(Math.random() * size);
            const startY = Math.floor(Math.random() * size);
            const stack = [[startX, startY]];
            visited[idx(startX, startY)] = true;

            while (stack.length) {
                const [x, y] = stack[stack.length - 1];
                const options = DIRS.filter(d =>
                    inBounds(x + d.dx, y + d.dy) && !visited[idx(x + d.dx, y + d.dy)]
                );
                if (!options.length) {
                    stack.pop();
                    continue;
                }
                const d = options[Math.floor(Math.random() * options.length)];
                const nx = x + d.dx, ny = y + d.dy;
                masks[idx(x, y)] |= d.bit;
                masks[idx(nx, ny)] |= d.opp;
                visited[idx(nx, ny)] = true;
                stack.push([nx, ny]);
            }

            tiles = masks.map(m => ({
                mask: m,
                rot: 0,
                displayRot: 0,
                isLeaf: popcount(m) === 1
            }));

            // Core sits at the center of the board
            source = idx(Math.floor(size / 2), Math.floor(size / 2));

            scramble();
            moves = 0;
            solved = false;
            winAnim = null;
            particles = [];
            flashT = new Array(total).fill(-Infinity);
            canvas.classList.remove("won");
            moveEl.textContent = "0";
            winOverlay.classList.remove("show");
            computeConnected();
        }

        function scramble() {
            do {
                tiles.forEach(t => {
                    t.rot = Math.floor(Math.random() * 4);
                    t.displayRot = t.rot;
                });
            } while (isSolvedState()); // never hand out a pre-solved board
        }

        /* ---------- Connectivity (BFS from the core) ---------- */
        function computeConnected() {
            connected = new Set([source]);
            const queue = [source];
            while (queue.length) {
                const i = queue.shift();
                const x = i % size, y = Math.floor(i / size);
                const m = currentMask(tiles[i]);
                for (const d of DIRS) {
                    if (!(m & d.bit)) continue;
                    const nx = x + d.dx, ny = y + d.dy;
                    if (!inBounds(nx, ny)) continue;
                    const j = idx(nx, ny);
                    if (connected.has(j)) continue;
                    if (currentMask(tiles[j]) & d.opp) {
                        connected.add(j);
                        queue.push(j);
                    }
                }
            }
        }

        function isSolvedState() {
            computeConnected();
            return connected.size === size * size;
        }

        // Distance of every tile from the core, following the (solved) wiring.
        // Drives the win surge: the wave lights tiles up in BFS order.
        function bfsDepths() {
            const depths = new Array(size * size).fill(-1);
            depths[source] = 0;
            const queue = [source];
            while (queue.length) {
                const i = queue.shift();
                const x = i % size, y = Math.floor(i / size);
                const m = currentMask(tiles[i]);
                for (const d of DIRS) {
                    if (!(m & d.bit)) continue;
                    const nx = x + d.dx, ny = y + d.dy;
                    if (!inBounds(nx, ny)) continue;
                    const j = idx(nx, ny);
                    if (depths[j] !== -1) continue;
                    if (currentMask(tiles[j]) & d.opp) {
                        depths[j] = depths[i] + 1;
                        queue.push(j);
                    }
                }
            }
            return depths;
        }

        /* ---------- Sound (WebAudio, no assets) ---------- */
        let audioCtx = null;
        function audio() {
            try {
                const AC = window.AudioContext || window.webkitAudioContext;
                if (!AC) return null;
                if (!audioCtx) audioCtx = new AC();
                if (audioCtx.state === "suspended") audioCtx.resume();
                return audioCtx;
            } catch (e) { return null; }
        }

        // Soft click on every rotation; pitch rises with how much of the grid is powered
        function clickSound(poweredFrac) {
            const ctx = audio(); if (!ctx) return;
            try {
                const t = ctx.currentTime;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = "triangle";
                osc.frequency.value = 220 + 260 * poweredFrac;
                gain.gain.setValueAtTime(0.1, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(t); osc.stop(t + 0.08);
            } catch (e) { /* sound is never worth breaking the game */ }
        }

        // Rising surge while the wave sweeps the grid, then a bright chime
        function winSound(surgeDur) {
            const ctx = audio(); if (!ctx) return;
            try {
                const t = ctx.currentTime;
                const osc = ctx.createOscillator();
                const filter = ctx.createBiquadFilter();
                const gain = ctx.createGain();
                osc.type = "sawtooth";
                osc.frequency.setValueAtTime(70, t);
                osc.frequency.exponentialRampToValueAtTime(560, t + surgeDur);
                filter.type = "lowpass";
                filter.frequency.setValueAtTime(300, t);
                filter.frequency.exponentialRampToValueAtTime(3600, t + surgeDur);
                gain.gain.setValueAtTime(0.001, t);
                gain.gain.exponentialRampToValueAtTime(0.13, t + surgeDur * 0.7);
                gain.gain.exponentialRampToValueAtTime(0.001, t + surgeDur + 0.12);
                osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
                osc.start(t); osc.stop(t + surgeDur + 0.15);

                [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
                    const t0 = t + surgeDur + i * 0.06;
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.type = "sine";
                    o.frequency.value = freq;
                    g.gain.setValueAtTime(0.15, t0);
                    g.gain.exponentialRampToValueAtTime(0.001, t0 + 1.0);
                    o.connect(g); g.connect(ctx.destination);
                    o.start(t0); o.stop(t0 + 1.05);
                });
            } catch (e) { /* sound is never worth breaking the game */ }
        }

        /* ---------- Win surge & sparks ---------- */
        function startWinAnim() {
            const depths = bfsDepths();
            let maxDepth = 1;
            for (const d of depths) if (d > maxDepth) maxDepth = d;
            winAnim = {
                start: pulseT,
                dur: Math.min(1.3, 0.3 + maxDepth * 0.055), // quick sweep, a bit longer on big boards
                depths,
                maxDepth,
                popped: new Array(depths.length).fill(false),
                popT: new Array(depths.length).fill(0)
            };
            return winAnim;
        }

        function spawnSparks(i, count) {
            if (particles.length > 350) return;
            const x = (i % size) * cell + cell / 2;
            const y = Math.floor(i / size) * cell + cell / 2;
            for (let k = 0; k < count; k++) {
                const ang = Math.random() * Math.PI * 2;
                const sp = (0.6 + Math.random()) * cell * 2.2;
                particles.push({
                    x, y,
                    vx: Math.cos(ang) * sp,
                    vy: Math.sin(ang) * sp,
                    life: 0,
                    max: 0.35 + Math.random() * 0.4,
                    white: Math.random() < 0.35
                });
            }
        }

        // Extra brightness for a tile: a short flash when it first gets power,
        // plus the win surge sweeping over it in BFS order.
        function tileBoost(i) {
            if (reducedMotion) return 0;
            let b = Math.exp((flashT[i] - pulseT) * 5);
            if (winAnim) {
                const elapsed = pulseT - winAnim.start;
                const wave = Math.min(1, elapsed / winAnim.dur) * winAnim.maxDepth;
                const d = winAnim.depths[i];
                if (d >= 0) {
                    const dist = d - wave;
                    b += Math.exp(-dist * dist * 1.6) + (dist < 0 ? 0.18 : 0);
                }
            }
            return Math.min(1, b);
        }

        // Blend the live cyan toward white as boost approaches 1
        function surgeColor(boost) {
            const r = Math.round(34 + 221 * boost);
            const g = Math.round(211 + 44 * boost);
            const b = Math.round(238 + 17 * boost);
            return `rgb(${r}, ${g}, ${b})`;
        }

        /* ---------- Rendering ---------- */
        let pulseT = 0;

        function resize() {
            const maxW = Math.min(window.innerWidth - 32, 640);
            const maxH = window.innerHeight - canvas.getBoundingClientRect().top - 40;
            cssSize = Math.max(240, Math.min(maxW, maxH));
            cell = cssSize / size;

            const dpr = window.devicePixelRatio || 1;
            canvas.style.width = cssSize + "px";
            canvas.style.height = cssSize + "px";
            canvas.width = Math.round(cssSize * dpr);
            canvas.height = Math.round(cssSize * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function draw() {
            ctx.clearRect(0, 0, cssSize, cssSize);

            // Faint grid lines
            ctx.strokeStyle = COLOR.gridLine;
            ctx.lineWidth = 1;
            for (let i = 1; i < size; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cell, 0); ctx.lineTo(i * cell, cssSize);
                ctx.moveTo(0, i * cell); ctx.lineTo(cssSize, i * cell);
                ctx.stroke();
            }

            const wireW = Math.max(4, cell * 0.16);
            const glow = solved
                ? 0.75 + 0.25 * Math.sin(pulseT * 3)
                : 0.55 + 0.2 * Math.sin(pulseT * 2);

            for (let i = 0; i < tiles.length; i++) {
                const t = tiles[i];
                const x = (i % size) * cell + cell / 2;
                const y = Math.floor(i / size) * cell + cell / 2;
                const live = connected.has(i);

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(t.displayRot * Math.PI / 2);

                const boost = tileBoost(i);
                const liveColor = boost > 0.01 ? surgeColor(boost) : COLOR.wireLive;

                ctx.lineCap = "round";
                ctx.lineWidth = wireW * (1 + 0.3 * boost);
                if (live) {
                    ctx.strokeStyle = liveColor;
                    ctx.shadowColor = COLOR.wireLive;
                    ctx.shadowBlur = (reducedMotion ? 6 : 10 * glow) + 26 * boost;
                } else {
                    ctx.strokeStyle = COLOR.wireDead;
                    ctx.shadowBlur = 0;
                }

                // Draw each wire arm of the (unrotated) base mask;
                // the ctx.rotate above applies the tile's rotation.
                const arm = cell / 2;
                if (t.mask & N) { ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -arm); ctx.stroke(); }
                if (t.mask & E) { ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(arm, 0); ctx.stroke(); }
                if (t.mask & S) { ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, arm); ctx.stroke(); }
                if (t.mask & W) { ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-arm, 0); ctx.stroke(); }

                ctx.shadowBlur = 0;

                // Tile centerpiece
                if (i === source) {
                    // The core: glowing heart + ring
                    ctx.fillStyle = boost > 0.01 ? surgeColor(boost) : COLOR.wireLive;
                    ctx.shadowColor = COLOR.wireLive;
                    ctx.shadowBlur = (reducedMotion ? 8 : 14 * glow) + 30 * boost;
                    ctx.beginPath();
                    ctx.arc(0, 0, cell * 0.2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = COLOR.coreRing;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, cell * 0.28, 0, Math.PI * 2);
                    ctx.stroke();
                } else if (t.isLeaf) {
                    // Endpoint bulb: lights up when powered, pops when the surge hits it
                    let r = cell * 0.17;
                    if (winAnim && winAnim.popped[i]) {
                        r *= 1 + 0.5 * Math.exp((winAnim.popT[i] - pulseT) * 6);
                    }
                    ctx.fillStyle = live ? liveColor : COLOR.bulbDead;
                    if (live) {
                        ctx.shadowColor = COLOR.wireLive;
                        ctx.shadowBlur = (reducedMotion ? 8 : 14 * glow) + 26 * boost;
                    }
                    ctx.beginPath();
                    ctx.arc(0, 0, r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = live ? COLOR.wireLive : COLOR.wireDead;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, r, 0, Math.PI * 2);
                    ctx.stroke();
                } else {
                    // Small joint dot
                    ctx.fillStyle = live ? COLOR.wireLive : COLOR.wireDead;
                    ctx.beginPath();
                    ctx.arc(0, 0, wireW * 0.62, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }

            // Sparks thrown off by bulbs as the surge passes
            for (const p of particles) {
                const a = Math.max(0, 1 - p.life / p.max);
                ctx.fillStyle = p.white
                    ? `rgba(255, 255, 255, ${a})`
                    : `rgba(34, 211, 238, ${a})`;
                ctx.shadowColor = COLOR.wireLive;
                ctx.shadowBlur = 8 * a;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 1 + 2.2 * a, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }

        function tick() {
            pulseT += 1 / 60;

            // Animate tile rotations toward their logical state
            let animating = false;
            for (const t of tiles) {
                if (t.displayRot !== t.rot) {
                    if (reducedMotion) {
                        t.displayRot = t.rot;
                    } else {
                        const diff = t.rot - t.displayRot;
                        t.displayRot += diff * 0.35;
                        if (Math.abs(t.rot - t.displayRot) < 0.01) t.displayRot = t.rot;
                        else animating = true;
                    }
                }
            }

            // Advance the win surge: pop bulbs and throw sparks as the wave reaches them
            if (winAnim) {
                const elapsed = pulseT - winAnim.start;
                const wave = Math.min(1, elapsed / winAnim.dur) * winAnim.maxDepth;
                for (let i = 0; i < tiles.length; i++) {
                    const d = winAnim.depths[i];
                    if (d >= 0 && d <= wave && !winAnim.popped[i]) {
                        winAnim.popped[i] = true;
                        winAnim.popT[i] = pulseT;
                        if (i === source) spawnSparks(i, 14);
                        else if (tiles[i].isLeaf) spawnSparks(i, 7);
                    }
                }
            }

            if (particles.length) {
                const dt = 1 / 60;
                particles = particles.filter(p => {
                    p.life += dt;
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vx *= 0.94;
                    p.vy *= 0.94;
                    return p.life < p.max;
                });
            }

            draw();
            requestAnimationFrame(tick);
        }

        /* ---------- Input ---------- */
        canvas.addEventListener("pointerdown", ev => {
            if (solved) return;
            const rect = canvas.getBoundingClientRect();
            const px = ev.clientX - rect.left;
            const py = ev.clientY - rect.top;
            const tx = Math.floor(px / cell);
            const ty = Math.floor(py / cell);
            if (!inBounds(tx, ty)) return;

            const t = tiles[idx(tx, ty)];
            t.rot += 1;             // keep counting up so animation always spins CW
            moves++;
            moveEl.textContent = moves;

            const wasConnected = connected;
            computeConnected();
            // Tiles that just received power flash briefly
            for (const i of connected) {
                if (!wasConnected.has(i)) flashT[i] = pulseT;
            }
            clickSound(connected.size / (size * size));

            if (connected.size === size * size) {
                solved = true;
                winStats.textContent = `Solved in ${moves} move${moves === 1 ? "" : "s"} on ${size}\u00d7${size}.`;
                canvas.classList.add("won");
                if (reducedMotion) {
                    winSound(0.4);
                    winOverlay.classList.add("show");
                } else {
                    // Let the final rotation land, then surge power through the grid
                    setTimeout(() => {
                        startWinAnim();
                        winSound(winAnim.dur);
                        setTimeout(() => winOverlay.classList.add("show"), winAnim.dur * 1000 + 500);
                    }, 260);
                }
            }
        });

        /* ---------- Controls ---------- */
        document.getElementById("newBtn").addEventListener("click", generate);
        document.getElementById("againBtn").addEventListener("click", generate);

        document.querySelectorAll(".sizeBtn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".sizeBtn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                size = parseInt(btn.dataset.size, 10);
                resize();
                generate();
            });
        });

        window.addEventListener("resize", () => { resize(); });

        /* ---------- Boot ---------- */
        resize();
        generate();
        tick();
    </script>
</body>
</html>
