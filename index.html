<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Arcade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;          /* slate-900, same as before */
            --panel: #1e293b;       /* slate-800 */
            --panel-edge: #334155;  /* slate-700 */
            --ink: #e2e8f0;         /* slate-200 */
            --ink-dim: #94a3b8;     /* slate-400 */
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--ink);
            margin: 0;
            min-height: 100vh;
        }

        /* Animated dot background (unchanged behavior) */
        #dotCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            display: block;
        }

        .wrap {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 64px 24px 80px;
        }

        /* ---------- Header ---------- */
        header { text-align: center; margin-bottom: 56px; }

        .eyebrow {
            font-family: 'Silkscreen', monospace;
            font-size: 12px;
            letter-spacing: 0.25em;
            color: var(--ink-dim);
            text-transform: uppercase;
            margin: 0 0 12px;
        }

        h1 {
            font-family: 'Silkscreen', monospace;
            font-weight: 700;
            font-size: clamp(32px, 6vw, 56px);
            margin: 0 0 16px;
            line-height: 1.1;
        }

        /* Blinking cursor after the title, arcade-style */
        h1::after {
            content: "_";
            animation: blink 1.1s steps(1) infinite;
            color: var(--ink-dim);
        }
        @keyframes blink { 50% { opacity: 0; } }
        @media (prefers-reduced-motion: reduce) {
            h1::after { animation: none; }
            .card, .card:hover { transition: none; transform: none; }
        }

        .subtitle {
            font-size: 18px;
            color: var(--ink-dim);
            margin: 0;
        }

        /* ---------- Game grid ---------- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .card {
            display: flex;
            flex-direction: column;
            background: var(--panel);
            border: 1px solid var(--panel-edge);
            border-top: 6px solid var(--accent, #64748b); /* cartridge stripe */
            border-radius: 14px;
            padding: 28px 24px 24px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .card:hover, .card:focus-visible {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
            border-color: var(--accent, #64748b);
        }

        .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

        .card .icon {
            font-size: 34px;
            line-height: 1;
            margin-bottom: 16px;
        }

        .card h2 {
            font-family: 'Silkscreen', monospace;
            font-weight: 400;
            font-size: 18px;
            margin: 0 0 10px;
            color: var(--accent, var(--ink));
        }

        .card p {
            font-size: 15px;
            color: var(--ink-dim);
            line-height: 1.55;
            margin: 0 0 22px;
            flex-grow: 1; /* keeps "play" rows aligned across cards */
        }

        .card .play {
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent, var(--ink));
        }
        .card .play::after {
            content: " →";
            transition: margin-left 0.18s ease;
        }
        .card:hover .play::after { margin-left: 6px; }

        /* "Coming soon" cards render dimmed and unclickable */
        .card.soon {
            opacity: 0.5;
            pointer-events: none;
            border-top-style: dashed;
        }
        .card.soon .play { color: var(--ink-dim); }

        footer {
            margin-top: 64px;
            text-align: center;
            font-family: 'Silkscreen', monospace;
            font-size: 11px;
            letter-spacing: 0.2em;
            color: #475569;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <canvas id="dotCanvas"></canvas>

    <div class="wrap">
        <header>
            <p class="eyebrow">Free to play &middot; No quarters needed</p>
            <h1>The Arcade</h1>
            <p class="subtitle">Pick a game. Lose an afternoon.</p>
        </header>

        <main class="grid" id="gameGrid" aria-label="Games"></main>

        <footer>Insert coin to continue</footer>
    </div>

    <script>
        /* ============================================================
           ADD YOUR GAMES HERE.
           To add a new game, copy one of these objects and edit it.
           Fields:
             title    — name shown on the card
             tagline  — one-line description
             href     — link to the game's page
             accent   — the card's stripe/title color (any CSS color)
             icon     — an emoji (or short string) shown on the card
             comingSoon — optional; set true to show a dimmed,
                          unclickable placeholder card
           ============================================================ */
        const GAMES = [
            {
                title: "Editor Clickor",
                tagline: "Ready to address those notes? Click your way through the edit queue.",
                href: "/EditorClickor/index.html",
                accent: "#34d399", // emerald, matching its old button
                icon: "🖱️"
            },
            {
                title: "Starlight Search",
                tagline: "Scan the night sky and find what's hiding among the stars.",
                href: "/StarlightSearch/index.html",
                accent: "#818cf8", // indigo
                icon: "🔭"
            },
            {
                title: "TowerStack",
                tagline: "Drop swinging blocks onto a growing tower. Perfect the pendulum physics.",
                href: "/TowerStack/index.html",
                accent: "#f87171", // red
                icon: "🏗️"
            },
            {
                title: "Pixel Particle Grounds",
                tagline: "Drop sand, water, and more. Watch the physics play out, pixel by pixel.",
                href: "/PixelParticleGrounds/index.html",
                accent: "#fbbf24", // amber, like sand
                icon: "⏳"
            },
            {
                title: "Loose Wires",
                tagline: "Rotate tangled wires to reconnect the grid. Every puzzle is freshly generated.",
                href: "/LooseWires/index.html",
                accent: "#22d3ee", // cyan, matching the game's powered wires
                icon: "🔌"
            }
            // Example of a teaser card:
            // {
            //     title: "Mystery Game",
            //     tagline: "Something new is in the works...",
            //     href: "#",
            //     accent: "#f472b6",
            //     icon: "❓",
            //     comingSoon: true
            // }
        ];

        // ---- Render the grid from the GAMES array ----
        const grid = document.getElementById('gameGrid');
        GAMES.forEach(game => {
            const card = document.createElement('a');
            card.className = 'card' + (game.comingSoon ? ' soon' : '');
            card.href = game.href;
            card.style.setProperty('--accent', game.accent);
            if (game.comingSoon) {
                card.setAttribute('aria-disabled', 'true');
                card.removeAttribute('href');
            }

            card.innerHTML = `
                <div class="icon">${game.icon || '🎮'}</div>
                <h2></h2>
                <p></p>
                <span class="play">${game.comingSoon ? 'Coming soon' : 'Play now'}</span>
            `;
            // Set text via textContent so titles/taglines are always safe
            card.querySelector('h2').textContent = game.title;
            card.querySelector('p').textContent = game.tagline;

            grid.appendChild(card);
        });

        /* ============================================================
           Ambient dot background (Perlin noise) — unchanged from the
           original homepage.
           ============================================================ */
        const noise = (function() {
            var module = {};
            function Grad(x, y, z) { this.x = x; this.y = y; this.z = z; }
            Grad.prototype.dot3 = function(x, y, z) { return this.x*x + this.y*y + this.z*z; };

            var grad3 = [new Grad(1,1,0),new Grad(-1,1,0),new Grad(1,-1,0),new Grad(-1,-1,0),
                         new Grad(1,0,1),new Grad(-1,0,1),new Grad(1,0,-1),new Grad(-1,0,-1),
                         new Grad(0,1,1),new Grad(0,-1,1),new Grad(0,1,-1),new Grad(0,-1,-1)];

            var p = [151,160,137,91,90,15,
            131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,
            190, 6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,
            88,237,149,56,87,174,20,125,136,171,168, 68,175,74,165,71,134,139,48,27,166,
            77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,
            102,143,54, 65,25,63,161, 1,216,80,73,209,76,132,187,208, 89,18,169,200,196,
            135,130,116,188,159,86,164,100,109,198,173,186, 3,64,52,217,226,250,124,123,
            5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,
            223,183,170,213,119,248,152, 2,44,154,163, 70,221,153,101,155,167, 43,172,9,
            129,22,39,253, 19,98,108,110,79,113,224,232,178,185, 112,104,218,246,97,228,
            251,34,242,193,238,210,144,12,191,179,162,241, 81,51,145,235,249,14,239,107,
            49,192,214, 31,181,199,106,157,184, 84,204,176,115,121,50,45,127, 4,150,254,
            138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180];

            var perm = new Array(512);
            var gradP = new Array(512);

            module.seed = function(seed) {
                if (seed > 0 && seed < 1) { seed *= 65536; }
                seed = Math.floor(seed);
                if (seed < 256) { seed |= seed << 8; }
                for (var i = 0; i < 256; i++) {
                    var v;
                    if (i & 1) { v = p[i] ^ (seed & 255); }
                    else { v = p[i] ^ ((seed >> 8) & 255); }
                    perm[i] = perm[i + 256] = v;
                    gradP[i] = gradP[i + 256] = grad3[v % 12];
                }
            };
            module.seed(0);

            function fade(t) { return t*t*t*(t*(t*6-15)+10); }
            function lerp(a, b, t) { return (1-t)*a + t*b; }

            module.perlin3 = function(x, y, z) {
                var X = Math.floor(x), Y = Math.floor(y), Z = Math.floor(z);
                x = x - X; y = y - Y; z = z - Z;
                X = X & 255; Y = Y & 255; Z = Z & 255;
                var gi000 = gradP[X+perm[Y+perm[Z]]];
                var gi001 = gradP[X+perm[Y+perm[Z+1]]];
                var gi010 = gradP[X+perm[Y+1+perm[Z]]];
                var gi011 = gradP[X+perm[Y+1+perm[Z+1]]];
                var gi100 = gradP[X+1+perm[Y+perm[Z]]];
                var gi101 = gradP[X+1+perm[Y+perm[Z+1]]];
                var gi110 = gradP[X+1+perm[Y+1+perm[Z]]];
                var gi111 = gradP[X+1+perm[Y+1+perm[Z+1]]];
                var n000 = gi000.dot3(x,y,z);
                var n100 = gi100.dot3(x-1,y,z);
                var n010 = gi010.dot3(x,y-1,z);
                var n110 = gi110.dot3(x-1,y-1,z);
                var n001 = gi001.dot3(x,y,z-1);
                var n101 = gi101.dot3(x-1,y,z-1);
                var n011 = gi011.dot3(x,y-1,z-1);
                var n111 = gi111.dot3(x-1,y-1,z-1);
                var u = fade(x), v = fade(y), w = fade(z);
                return lerp(
                    lerp(lerp(n000, n100, u), lerp(n010, n110, u), v),
                    lerp(lerp(n001, n101, u), lerp(n011, n111, u), v),
                    w);
            };

            return module;
        }());

        const canvas = document.getElementById('dotCanvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        const dotConfig = {
            gridSpacing: 25,
            radius: 1.5,
            color: '#334155',
            noiseMagnitude: 3.0,
            noiseSpeed: 0.003,
            noisePositionScale: 0.05
        };
        let time = Math.random() * 1000;

        function Dot(baseX, baseY) {
            this.baseX = baseX; this.baseY = baseY;
            this.x = baseX; this.y = baseY;
            this.noiseOffsetX = Math.random() * 1000;
            this.noiseOffsetY = Math.random() * 1000;
        }

        function initDotsGrid() {
            dots = [];
            const spacing = dotConfig.gridSpacing;
            const startX = (canvas.width % spacing) / 2;
            const startY = (canvas.height % spacing) / 2;
            noise.seed(Math.random());
            for (let x = startX; x < canvas.width; x += spacing) {
                for (let y = startY; y < canvas.height; y += spacing) {
                    dots.push(new Dot(x, y));
                }
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initDotsGrid();
        }

        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        function drawDots() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = dotConfig.color;
            time += dotConfig.noiseSpeed;
            dots.forEach(dot => {
                const nx = dot.baseX * dotConfig.noisePositionScale + dot.noiseOffsetX;
                const ny = dot.baseY * dotConfig.noisePositionScale + dot.noiseOffsetY;
                const offsetX = noise.perlin3(nx, ny, time) * dotConfig.noiseMagnitude;
                const offsetY = noise.perlin3(ny, nx, time + 50) * dotConfig.noiseMagnitude;
                dot.x = dot.baseX + offsetX;
                dot.y = dot.baseY + offsetY;
                ctx.beginPath();
                ctx.arc(Math.round(dot.x), Math.round(dot.y), dotConfig.radius, 0, Math.PI * 2);
                ctx.fill();
            });
            if (!reducedMotion) requestAnimationFrame(drawDots);
        }

        resizeCanvas();
        drawDots();
        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
