        const shopOverlay = document.getElementById("shopOverlay");
        const shopBody = document.getElementById("shopBody");
        let shopTab = "up";

        function openShop() {
            shopTab = shopTab || "up";
            renderShop();
            shopOverlay.classList.add("show");
        }
        function renderShop() {
            document.getElementById("shopCoins").textContent = SAVE.coins + " c";
            document.getElementById("tabUpgrades").classList.toggle("active", shopTab === "up");
            document.getElementById("tabWardrobe").classList.toggle("active", shopTab === "ward");
            shopBody.innerHTML = "";
            if (shopTab === "up") renderUpgrades();
            else renderWardrobe();
        }

        function renderUpgrades() {
            for (const key of Object.keys(UPGRADES)) {
                const u = UPGRADES[key];
                const lvl = SAVE.up[key];
                const row = document.createElement("div");
                row.className = "shoprow";
                const info = document.createElement("div");
                info.className = "info";
                const pips = Array.from({ length: u.max }, (_, i) =>
                    `<span class="pip${i < lvl ? " on" : ""}"></span>`).join("");
                info.innerHTML = `<div class="name"></div><div class="desc"></div><div class="pips">${pips}</div>`;
                info.querySelector(".name").textContent = u.name;
                info.querySelector(".desc").textContent = u.desc;
                const btn = document.createElement("button");
                if (lvl >= u.max) {
                    btn.textContent = "MAX";
                    btn.disabled = true;
                    btn.className = "max";
                } else {
                    const cost = upgradeCost(key);
                    btn.textContent = cost + " c";
                    btn.disabled = SAVE.coins < cost;
                    btn.addEventListener("click", () => {
                        if (SAVE.coins < cost) return;
                        SAVE.coins -= cost;
                        SAVE.up[key]++;
                        if (key === "burp" && phase < PHASE.FLIGHT) burpCharges = SAVE.up.burp;
                        save(); sndBuy(); updateHud(); renderShop();
                    });
                }
                row.appendChild(info);
                row.appendChild(btn);
                shopBody.appendChild(row);
            }
        }

        function renderWardrobe() {
            const sections = [["weapon", "Weapons"], ["color", "Blob Color"], ["hat", "Hats"], ["glasses", "Glasses"], ["neck", "Necklaces"]];
            for (const [cat, label] of sections) {
                const h = document.createElement("div");
                h.className = "wardsection";
                h.textContent = label;
                shopBody.appendChild(h);
                const wrap = document.createElement("div");
                wrap.className = "warditems";
                for (const item of COSMETICS[cat]) {
                    const owned = SAVE.owned[cat].includes(item.id);
                    const equipped = SAVE.eq[cat] === item.id;
                    const btn = document.createElement("button");
                    btn.className = "warditem" + (equipped ? " equipped" : "");
                    let inner = "";
                    if (cat === "color") inner += `<span class="dot" style="background:${item.body}"></span>`;
                    inner += `<span></span>`;
                    if (!owned) inner += `<span class="price">${item.cost} c</span>`;
                    else if (equipped) inner += `<span>✓</span>`;
                    btn.innerHTML = inner;
                    btn.querySelector("span:nth-child(" + (cat === "color" ? 2 : 1) + ")").textContent = item.name;
                    if (!owned) btn.disabled = SAVE.coins < item.cost;
                    btn.addEventListener("click", () => {
                        if (!owned) {
                            if (SAVE.coins < item.cost) return;
                            SAVE.coins -= item.cost;
                            SAVE.owned[cat].push(item.id);
                            sndBuy();
                        }
                        SAVE.eq[cat] = item.id;
                        save(); updateHud(); renderShop();
                    });
                    wrap.appendChild(btn);
                }
                shopBody.appendChild(wrap);
            }
        }

        document.getElementById("muteBtn").addEventListener("click", () => {
            SAVE.muted = !SAVE.muted;
            save();
            updateHud();
        });
        document.getElementById("shopBtn").addEventListener("click", openShop);
        document.getElementById("resultsShopBtn").addEventListener("click", openShop);
        document.getElementById("shopCloseBtn").addEventListener("click", () => shopOverlay.classList.remove("show"));
        document.getElementById("tabUpgrades").addEventListener("click", () => { shopTab = "up"; renderShop(); });
        document.getElementById("tabWardrobe").addEventListener("click", () => { shopTab = "ward"; renderShop(); });
        document.getElementById("againBtn").addEventListener("click", resetRun);

        /* ---------- Main loop ---------- */
        let lastT = performance.now();
        function tick(nowMs) {
            const raw = Math.min((nowMs - lastT) / 1000, 0.05);
            lastT = nowMs;
            let dt = raw;
            if (hitstopT > 0) { hitstopT -= raw; dt = 0; }          // impact freeze-frame
            else if (slowmoT > 0) { slowmoT -= raw; dt = raw * 0.35; } // crit slow-mo
            if (phase <= PHASE.SWING) stepAim(dt);
            if (phase === PHASE.FLIGHT) {
                stepFlight(dt);
                document.getElementById("hudDist").textContent = Math.floor(dist) + "m";
                if (SAVE.up.burp > 0) {
                    document.getElementById("hudBoosts").textContent =
                        "💨×" + burpCharges + (SAVE.up.slam > 0 ? "  ⬇" : "");
                }
            }
            stepFx(dt);
            requestAnimationFrame(tick);
        }

        /* ---------- Boot ---------- */
        window.addEventListener("resize", layout);
        layout();
        resetRun();
        requestAnimationFrame(tick);
        requestAnimationFrame(draw);
    </script>
</body>
</html>
